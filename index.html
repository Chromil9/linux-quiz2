<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux & OS alapok – Interaktív tananyag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<style>

:root{
  --bg:#0e1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --bd:#30363d;--bd2:#484f58;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#656d76;
  --ac:#7c6af7;--ac2:#a89af9;
  --gr:#3fb950;--gr2:#238636;
  --re:#f85149;--ye:#e3b341;--cy:#58a6ff;--pu:#bc8cff;--or:#ffa657;
  --mono:'JetBrains Mono',monospace;
  --head:'Syne',sans-serif;
  --sw:270px;--r:6px;--rl:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--mono);background:var(--bg);color:var(--tx);
     min-height:100vh;display:flex;font-size:14px;line-height:1.6;overflow-x:hidden}

/* ── SIDEBAR ── */
#sb{width:var(--sw);background:var(--bg2);border-right:1px solid var(--bd);
    height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;
    z-index:100;overflow:hidden;transition:transform .3s}
.sb-top{padding:18px 16px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sb-icon{width:30px;height:30px;background:var(--ac);border-radius:7px;
         display:flex;align-items:center;justify-content:center;
         font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.sb-title{font-family:var(--head);font-size:14px;font-weight:800;
          color:var(--tx);letter-spacing:-.02em}
.pb{height:3px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-top:4px}
.pb-fill{height:100%;background:var(--gr);border-radius:99px;
         transition:width .5s cubic-bezier(.4,0,.2,1)}
.pb-txt{font-size:11px;color:var(--tx3);margin-bottom:4px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;
        scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}
.ni{display:flex;align-items:center;gap:9px;padding:7px 16px;
    cursor:pointer;border:none;background:none;width:100%;text-align:left;
    position:relative;transition:background .12s;border-radius:0}
.ni:hover{background:var(--bg3)}
.ni.on{background:var(--bg4)}
.ni.on::before{content:'';position:absolute;left:0;top:0;bottom:0;
               width:2px;background:var(--ac);border-radius:0 2px 2px 0}
.ni-n{font-size:10px;color:var(--tx3);width:16px;flex-shrink:0;font-weight:500}
.ni.on .ni-n{color:var(--ac)}
.ni-l{font-size:12px;color:var(--tx2);flex:1;overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap}
.ni.on .ni-l{color:var(--ac2)}
.ni-dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--bd2);
        display:flex;align-items:center;justify-content:center;
        font-size:8px;flex-shrink:0;transition:all .25s}
.ni-dot.d{background:var(--gr);border-color:var(--gr);color:#0d1117}
.ni-dot.p{border-color:var(--ye);background:rgba(227,179,65,.12);color:var(--ye);font-size:9px}

/* ── MAIN ── */
#main{margin-left:var(--sw);flex:1;min-height:100vh;overflow-x:hidden}
.pg{display:none;max-width:820px;margin:0 auto;padding:44px 36px 80px;
    animation:fi .22s ease}
.pg.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ph{margin-bottom:28px}
.p-n{font-size:10px;color:var(--ac);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.p-t{font-family:var(--head);font-size:26px;font-weight:800;color:var(--tx);
     line-height:1.2;letter-spacing:-.03em}
.p-s{margin-top:7px;font-size:13px;color:var(--tx2);max-width:560px}

/* ── THEORY ── */
.th{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);
    margin-bottom:24px;overflow:hidden}
.th-hd{display:flex;align-items:center;gap:10px;padding:13px 16px;
       cursor:pointer;user-select:none;background:none;border:none;
       width:100%;color:var(--tx);transition:background .12s}
.th-hd:hover{background:var(--bg3)}
.th-ic{width:26px;height:26px;background:rgba(124,106,247,.15);border-radius:5px;
       display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.th-lb{flex:1;font-family:var(--head);font-size:13px;font-weight:700;text-align:left;color:var(--tx)}
.th-ar{font-size:11px;color:var(--tx3);transition:transform .22s}
.th-hd.op .th-ar{transform:rotate(180deg)}
.th-bd{padding:0 16px 16px;border-top:1px solid var(--bd);display:none}
.th-bd.op{display:block}
.th-bd h4{font-family:var(--head);font-size:12px;font-weight:700;color:var(--ac2);
          margin:16px 0 7px;text-transform:uppercase;letter-spacing:.04em}
.th-bd p{font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:9px}
.th-bd ul{margin:0 0 10px 4px;list-style:none}
.th-bd ul li{font-size:13px;color:var(--tx2);line-height:1.7;
             padding-left:12px;position:relative}
.th-bd ul li::before{content:'›';position:absolute;left:0;color:var(--ac)}
code{font-family:var(--mono);background:var(--bg4);color:var(--cy);
     padding:1px 5px;border-radius:4px;font-size:12px}
b{font-weight:600;color:var(--tx)}
.code-block{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);
            padding:14px 16px;margin:10px 0;overflow-x:auto}
.code-block pre{font-family:var(--mono);font-size:12px;color:var(--tx);line-height:1.7;white-space:pre}
.code-block pre .cy{color:var(--cy)}.code-block pre .gr{color:var(--gr)}
.code-block pre .ye{color:var(--ye)}.code-block pre .pu{color:var(--pu)}
.code-block pre .or{color:var(--or)}.code-block pre .re{color:var(--re)}
.code-block pre .cm{color:var(--tx3)}
.note{display:flex;gap:9px;border-radius:var(--r);padding:10px 13px;margin:10px 0}
.note.info{background:rgba(124,106,247,.07);border:1px solid rgba(124,106,247,.2)}
.note.warn{background:rgba(227,179,65,.06);border:1px solid rgba(227,179,65,.18)}
.note span{font-size:15px;flex-shrink:0;margin-top:1px}
.note p{font-size:12px;color:var(--tx2);line-height:1.65}
.note.info p b{color:var(--ac2)}.note.warn p b{color:var(--ye)}

/* ── EXERCISES ── */
.ex-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ex-hd h3{font-family:var(--head);font-size:15px;font-weight:700;color:var(--tx)}
.ex-ct{font-size:11px;color:var(--tx3)}
.ex{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);
    margin-bottom:14px;overflow:hidden;transition:border-color .25s}
.ex.ok{border-color:var(--gr2)}
.ex-top{padding:13px 16px;display:flex;align-items:flex-start;gap:11px}
.exn{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;
     justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.exn.p{background:var(--bg4);color:var(--tx3)}
.exn.s{background:var(--gr);color:#0d1117}
.ex-info{flex:1}
.ex-tp{font-size:10px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.ex-tp.cmd{color:var(--cy)}.ex-tp.bash{color:var(--or)}.ex-tp.c{color:var(--pu)}
.ex-tp.regex{color:var(--ye)}.ex-tp.mc{color:var(--ac2)}
.ex-q{font-size:13px;color:var(--tx);line-height:1.55}
.ex-body{padding:0 16px 14px;border-top:1px solid var(--bd)}
.ex-hint{font-size:12px;color:var(--tx3);padding:9px 0 7px;line-height:1.6}
.ex-hint code{color:var(--ye);font-size:11px}
.CodeMirror{font-family:var(--mono)!important;font-size:13px!important;
            border-radius:var(--r)!important;border:1px solid var(--bd)!important;height:auto!important}
.CodeMirror-scroll{min-height:36px}
.CodeMirror-focused{border-color:var(--ac)!important;box-shadow:0 0 0 2px rgba(124,106,247,.15)!important}
.sl .CodeMirror-scroll{max-height:40px;overflow:hidden!important}
.ml .CodeMirror-scroll{min-height:130px}
.acts{display:flex;gap:7px;margin-top:9px;align-items:center;flex-wrap:wrap}
.btn-go{padding:6px 16px;background:var(--ac);border:none;border-radius:var(--r);
        color:#fff;font-family:var(--mono);font-size:12px;font-weight:500;
        cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:5px}
.btn-go:hover{background:var(--ac2);transform:translateY(-1px)}
.btn-go:active{transform:translateY(0)}
.btn-go:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-tip{padding:6px 13px;background:transparent;border:1px solid var(--bd2);
         border-radius:var(--r);color:var(--tx3);font-family:var(--mono);
         font-size:12px;cursor:pointer;transition:all .14s}
.btn-tip:hover{border-color:var(--ye);color:var(--ye)}
.btn-rst{padding:6px 13px;background:transparent;border:1px solid var(--bd2);
         border-radius:var(--r);color:var(--tx3);font-family:var(--mono);
         font-size:12px;cursor:pointer;margin-left:auto;transition:all .14s}
.btn-rst:hover{color:var(--tx2)}
.fb{margin-top:9px;border-radius:var(--r);padding:11px 13px;font-size:12px;
    line-height:1.65;display:none;animation:fi .18s ease}
.fb.on{display:block}
.fb.ok{background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.22);color:#7ee787}
.fb.er{background:rgba(248,81,73,.07);border:1px solid rgba(248,81,73,.22);color:#ff9ea0}
.fb.tip{background:rgba(227,179,65,.06);border:1px solid rgba(227,179,65,.18);color:var(--ye)}
.fb code{background:rgba(255,255,255,.07);color:inherit;font-size:12px}
.mc-opts{display:flex;flex-direction:column;gap:5px;padding:7px 0}
.mc-o{padding:8px 13px;background:var(--bg3);border:1px solid var(--bd);
      border-radius:var(--r);cursor:pointer;font-family:var(--mono);font-size:13px;
      color:var(--tx2);transition:all .13s;text-align:left;display:flex;gap:9px;align-items:flex-start}
.mc-o:hover:not(:disabled){border-color:var(--ac);color:var(--tx);background:var(--bg4)}
.mc-o.ok{border-color:var(--gr);color:var(--gr);background:rgba(63,185,80,.05)}
.mc-o.ng{border-color:var(--re);color:var(--re);background:rgba(248,81,73,.05)}
.mc-o:disabled{cursor:default}
.mc-k{background:var(--bg4);border-radius:3px;padding:0 5px;font-size:10px;
      color:var(--tx3);flex-shrink:0;min-width:20px;text-align:center;margin-top:1px}
.nav-btns{display:flex;justify-content:space-between;margin-top:36px;
          padding-top:22px;border-top:1px solid var(--bd)}
.btn-nav{padding:8px 16px;background:var(--bg3);border:1px solid var(--bd2);
         border-radius:var(--r);color:var(--tx2);font-family:var(--mono);
         font-size:12px;cursor:pointer;transition:all .14s;display:flex;
         align-items:center;gap:7px}
.btn-nav:hover{border-color:var(--ac);color:var(--ac2)}
.btn-nav:disabled{opacity:.28;cursor:not-allowed}
#mbt{display:none;position:fixed;top:14px;left:14px;z-index:200;
     background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);
     width:34px;height:34px;align-items:center;justify-content:center;
     cursor:pointer;font-size:16px;color:var(--tx2)}
@media(max-width:768px){
  #sb{transform:translateX(-100%)}
  #sb.op{transform:translateX(0)}
  #main{margin-left:0}
  #mbt{display:flex}
  .pg{padding:56px 18px 60px}
}

</style>
</head>
<body>
<button id="mbt" onclick="document.getElementById('sb').classList.toggle('op')">☰</button>
<nav id="sb">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-icon">λ</div>
      <span class="sb-title">Linux & OS</span>
    </div>
    <div class="pb-txt" id="pbt">0% · 0 feladat megoldva</div>
    <div class="pb"><div class="pb-fill" id="pbf"></div></div>
  </div>
  <div class="sb-nav" id="nav"></div>
</nav>
<main id="main"></main>
<script>
const DATA = [
  {
    "id": 1,
    "title": "OS & Linux alapjai",
    "sub": "Kernel, shell, Linux felépítése, CLI gondolkodás",
    "theory": "<h4>Mi az operációs rendszer?</h4>\n<p>Az operációs rendszer (OS) szoftver, amely <b>közvetít a hardver és az alkalmazások között</b>. Kezeli a processzort, memóriát, fájlrendszert, I/O eszközöket és a folyamatokat.</p>\n<div class=\"note info\"><span>💡</span><p><b>Analógia:</b> az OS olyan mint egy étterem menedzsere – te (az alkalmazás) csak a pincérnek szólsz, ő szervezi a konyhát (hardver).</p></div>\n<h4>A Linux rétegei</h4>\n<div class=\"code-block\"><pre><span class=\"cy\">Felhasználói tér</span>  │ bash, python, vim, Firefox...\n─────────────────┼──────────────────────────────────\n<span class=\"gr\">Shell / libc</span>     │ rendszerhívások burkolata\n─────────────────┼──────────────────────────────────\n<span class=\"pu\">Kernel</span>           │ ütemező, memória, driverek, VFS\n─────────────────┼──────────────────────────────────\n<span class=\"ye\">Hardver</span>          │ CPU, RAM, SSD, NIC, GPU...</pre></div>\n<h4>Kernel vs Shell</h4>\n<ul>\n<li><b>Kernel:</b> a Linux magja. Közvetlenül kezeli a hardvert. Ring 0 privilegizált módban fut. Nem elérhető közvetlenül – csak rendszerhívásokon át.</li>\n<li><b>Shell:</b> parancsértelmező (interpreter). A kernellel syscallokon keresztül kommunikál. Fajták: <code>bash</code>, <code>zsh</code>, <code>sh</code>, <code>fish</code>, <code>ksh</code>.</li>\n</ul>\n<h4>CLI gondolkodás: kis programok + pipe</h4>\n<p>Unix-filozófia: minden program egy dolgot csináljon jól, szöveget vegyen be és adjon ki. A <code>|</code> (pipe) ezeket összeköti.</p>\n<div class=\"code-block\"><pre><span class=\"cm\"># Ki van bejelentkezve és hányan?</span>\n<span class=\"cy\">who</span> | <span class=\"gr\">wc -l</span>\n\n<span class=\"cm\"># Top 5 legtöbbet használt parancs</span>\n<span class=\"cy\">history</span> | <span class=\"gr\">awk '{print $2}'</span> | <span class=\"ye\">sort</span> | <span class=\"pu\">uniq -c</span> | <span class=\"or\">sort -rn</span> | <span class=\"re\">head -5</span></pre></div>\n<div class=\"note warn\"><span>⚠</span><p><b>Case-sensitive!</b> Linux-on a <code>Fajl.txt</code> és a <code>fajl.txt</code> két különböző fájl.</p></div>",
    "exercises": [
      {
        "type": "mc",
        "q": "Mi a Linux kernel elsődleges feladata?",
        "opts": [
          "Szöveges parancsokat értelmez és futtat",
          "Közvetlenül kezeli a hardvert és az erőforrásokat (CPU, memória, driverek)",
          "Weboldalakat tölt le és jelenít meg",
          "A bash shell másik elnevezése"
        ],
        "correct": 1,
        "exp": "A kernel (mag) hardverrel kommunikál, kezeli a memóriát, CPU ütemezést, eszközillesztőket. A shell (bash) felette fut és parancsokat értelmez."
      },
      {
        "type": "mc",
        "q": "Mit jelent a Unix-filozófia CLI kontextusban?",
        "opts": [
          "Egyetlen nagy program mindent megold",
          "Minden programnak grafikus felületnek kell lennie",
          "Sok kis program, mindegyik egy dolgot csinál jól; a | összeköti a kimeneteket/bemeneteket",
          "A pipe csak bash-ben létezik"
        ],
        "correct": 2,
        "exp": "Unix-filozófia: do one thing and do it well. A | (pipe) összeköti a programokat: egyik stdout → másik stdin."
      },
      {
        "type": "cmd",
        "q": "Írd meg a parancsot, amely kiírja az aktuális shell teljes elérési útját!",
        "hint": "Változó értékét echo-val lehet kiírni, a neve elé $ jel kell.",
        "placeholder": "echo ...",
        "accepted": [
          "echo $SHELL",
          "echo ${SHELL}"
        ],
        "ok": "Helyes! Az echo $SHELL a $SHELL környezeti változó értékét írja ki, pl. /bin/bash.",
        "err": "Helyes forma: echo $SHELL – az echo parancs kiírja a $SHELL változó értékét."
      }
    ]
  },
  {
    "id": 2,
    "title": "Shell parancsok",
    "sub": "Alapparancsok, formátum, man/whatis/apropos, fájlnevek, útvonalak",
    "theory": "<h4>Parancsok formátuma</h4>\n<div class=\"code-block\"><pre><span class=\"cy\">parancsnév</span> <span class=\"ye\">[opciók]</span> <span class=\"gr\">[argumentumok]</span>\n\n<span class=\"cy\">ls</span> <span class=\"ye\">-la</span> <span class=\"gr\">/home/user</span>       <span class=\"cm\"># -l: long, -a: all (rejtett is)</span>\n<span class=\"cy\">cp</span> <span class=\"ye\">-r</span> <span class=\"gr\">forras/ cel/</span>     <span class=\"cm\"># -r: recursive</span>\n<span class=\"cy\">chmod</span> <span class=\"ye\">u+x</span> <span class=\"gr\">script.sh</span>   <span class=\"cm\"># u=user, +x=add execute</span></pre></div>\n<p>Opciók: rövid (<code>-l</code>) vagy hosszú (<code>--long</code>) forma. Kombinálhatók: <code>-la</code> = <code>-l -a</code>. Elválasztó a szóköz.</p>\n<h4>Alapparancsok</h4>\n<div class=\"code-block\"><pre><span class=\"cy\">pwd</span>               <span class=\"cm\"># aktuális könyvtár (print working dir)</span>\n<span class=\"cy\">ls</span> <span class=\"ye\">-la</span>            <span class=\"cm\"># részletes listázás + rejtett fájlok</span>\n<span class=\"cy\">cd</span> <span class=\"gr\">/var/log</span>       <span class=\"cm\"># könyvtárváltás (change dir)</span>\n<span class=\"cy\">cp</span> <span class=\"ye\">-r</span> <span class=\"gr\">src/ dst/</span>  <span class=\"cm\"># rekurzív másolás</span>\n<span class=\"cy\">mv</span> <span class=\"gr\">old new</span>       <span class=\"cm\"># átnevezés / mozgatás</span>\n<span class=\"cy\">rm</span> <span class=\"ye\">-rf</span> <span class=\"gr\">dir/</span>      <span class=\"cm\"># ⚠ rekurzív törlés – visszavonhatatlan!</span>\n<span class=\"cy\">mkdir</span> <span class=\"ye\">-p</span> <span class=\"gr\">a/b/c</span>  <span class=\"cm\"># könyvtárlánc egyszerre</span>\n<span class=\"cy\">cat</span> <span class=\"gr\">f.txt</span>        <span class=\"cm\"># fájl tartalmának kiírása</span>\n<span class=\"cy\">less</span> <span class=\"gr\">f.txt</span>     "theory": "<h4>Átirányítás</h4>\n<div class=\"code-block\"><pre><span class=\"cy\">cmd</span> <span class=\"ye\">></span>  <span class=\"gr\">fajl</span>         <span class=\"cm\"># stdout → fájl (felülír)</span>\n<span class=\"cy\">cmd</span> <span class=\"ye\">>></span> <span class=\"gr\">fajl</span>         <span class=\"cm\"># stdout → fájl (hozzáfűz)</span>\n<span class=\"cy\">cmd</span> <span class=\"ye\"><</span>  <span class=\"gr\">fajl</span>         <span class=\"cm\"># stdin ← fájl</span>\n<span class=\"cy\">cmd</span> <span class=\"ye\">2></span> <span class=\"gr\">fajl</span>         <span class=\"cm\"># stderr → fájl</span>\n<span class=\"cy\">cmd</span> <span class=\"ye\">2>&1</span>             <span class=\"cm\"># stderr → stdout (ugyanoda)</span>\n<span class=\"cy\">cmd</span> <span class=\"ye\">>/dev/null 2>&1</span> <span class=\"cm\"># minden kimenet eldobva</span>\n<span class=\"cy\">cmd</span> <span class=\"ye\">&></span> <span class=\"gr\">fajl</span>         <span class=\"cm\"># stdout+stderr egyszerre (bash 4+)</span></pre></div>\n<h4>Pipeline (|)</h4>\n<div class=\"code-block\"><pre><span class=\"cm\"># Első stdout → következő stdin</span>\n<span class=\"cy\">ls -la</span> | <span class=\"gr\">grep \".txt\"</span> | <span class=\"ye\">sort</span> | <span class=\"pu\">wc -l</span>\n<span class=\"cm\"># Megszámolja a .txt fájlokat rendezve</span></pre></div>\n<h4>Globbing (fájlnév helyettesítők)</h4>\n<div class=\"code-block\"><pre><span class=\"ye\">*</span>        <span class=\"cm\"># 0+ tetszőleges karakter</span>\n<span class=\"ye\">?</span>        <span class=\"cm\"># pontosan 1 tetszőleges karakter</span>\n<span class=\"ye\">[abc]</span>    <span class=\"cm\"># a, b vagy c</span>\n<span class=\"ye\">[a-z]</span>    <span class=\"cm\"># kisbetű</span>\n<span class=\"ye\">[!0-9]</span>   <span class=\"cm\"># NEM számjegy</span>\n\n<span class=\"cy\">ls</span> <span class=\"ye\">*.c</span>           <span class=\"cm\"># minden .c fájl</span>\n<span class=\"cy\">ls</span> <span class=\"ye\">temp?.txt</span>     <span class=\"cm\"># temp1.txt, tempa.txt stb.</span>\n<span class=\"cy\">ls</span> <span class=\"ye\">[A-Z]*.sh</span>    <span class=\"cm\"># nagybetűvel kezdődő .sh fájlok</span></pre></div>\n<h4>Idézőjelek és escape</h4>\n<div class=\"code-block\"><pre><span class=\"ye\">'...'</span>   <span class=\"cm\"># betű szerint – semmi sem értelmez</span>\n<span class=\"ye\">\"...\"</span>   <span class=\"cm\"># értelmezi: $var, $(cmd), \\</span>\n<span class=\"ye\">\\</span>      <span class=\"cm\"># a következő karaktert levédi</span>\n\nname=vilag\necho <span class=\"gr\">'Hello $name'</span>   <span class=\"cm\"># → Hello $name</span>\necho <span class=\"gr\">\"Hello $name\"</span>   <span class=\"cm\"># → Hello vilag</span>\necho <span class=\"gr\">\\$name</span>          <span class=\"cm\"># → $name (levédve)</span></pre></div>\n<div class=\"note warn\"><span>⚠</span><p><b>Globbing ≠ Regex!</b> Shell-ben a <code>*</code> = bármennyi karakter. Regex-ben <code>*</code> = az előző elem 0+ ismétlése.</p></div>",

    "theory": "<h4>Alapszabályok</h4>\n<div class=\"code-block\"><pre><span class=\"ye\">.</span>       <span class=\"cm\"># bármely karakter (nem újsor)</span>\n<span class=\"ye\">^</span>       <span class=\"cm\"># sor eleje</span>\n<span class=\"ye\">$</span>       <span class=\"cm\"># sor vége</span>\n<span class=\"ye\">\\c</span>      <span class=\"cm\"># c betű szerinti (pl. \\. = pont, \\\\ = backslash)</span>\n\n<span class=\"gr\">^$</span>      <span class=\"cm\"># üres sor</span>\n<span class=\"gr\">^ *$</span>    <span class=\"cm\"># üres vagy csak szóközök</span>\n<span class=\"gr\">ab.</span>     <span class=\"cm\"># aba, abb, abc, ab1 stb.</span></pre></div>\n<h4>Kvantorök</h4>\n<div class=\"code-block\"><pre><span class=\"ye\">e*</span>       <span class=\"cm\"># 0 vagy többször    (alap + ERE)</span>\n<span class=\"ye\">e+</span>       <span class=\"cm\"># 1 vagy többször    (csak ERE)</span>\n<span class=\"ye\">e?</span>       <span class=\"cm\"># 0 vagy 1-szer      (csak ERE)</span>\n<span class=\"ye\">e{m,n}</span>  <span class=\"cm\"># legalább m, legfeljebb n (ERE)</span>\n<span class=\"ye\">e{3}</span>     <span class=\"cm\"># pontosan 3-szor</span>\n<span class=\"ye\">e{2,}</span>    <span class=\"cm\"># legalább 2-szer</span></pre></div>\n<h4>Karakterosztályok</h4>\n<div class=\"code-block\"><pre><span class=\"ye\">[abc]</span>    <span class=\"cm\"># a, b vagy c</span>\n<span class=\"ye\">[a-z]</span>    <span class=\"cm\"># kisbetű</span>\n<span class=\"ye\">[0-9]</span>    <span class=\"cm\"># számjegy</span>\n<span class=\"ye\">[^0-9]</span>   <span class=\"cm\"># NEM számjegy (^ = tagadás [ ] belsejében)</span>\n<span class=\"ye\">[:digit:]</span><span class=\"cm\"># = [0-9]   │  </span><span class=\"ye\">[:alpha:]</span><span class=\"cm\">  # betű</span>\n<span class=\"ye\">[:alnum:]</span><span class=\"cm\"># betű/szám │  </span><span class=\"ye\">[:space:]</span><span class=\"cm\">  # whitespace</span></pre></div>\n<h4>Alap vs ERE</h4>\n<div class=\"code-block\"><pre><span class=\"cm\"># Alap regex (grep, sed alapból):</span>\n<span class=\"gr\">\\(ab\\)*</span>    <span class=\"cm\"># csoport + *</span>\n<span class=\"gr\">\\{3\\}</span>      <span class=\"cm\"># pontosan 3-szor</span>\n\n<span class=\"cm\"># Kiterjesztett ERE (grep -E, egrep, sed -E):</span>\n<span class=\"gr\">(ab)*</span>    <span class=\"gr\">cat|dog</span>    <span class=\"gr\">[0-9]{4}</span>\n\n<span class=\"cm\"># Visszahivatkozás \\1:</span>\n<span class=\"gr\">^(.).*\\1$</span>  <span class=\"cm\"># ugyanolyan karakterrel kezd/végz</span></pre></div>",

    "id": 5,
    "title": "grep, sed, awk",
    "sub": "Szövegfeldolgozás parancssorból – keresés, csere, mezőfeldolgozás",
    "theory": "<h4>grep – szövegkeresés</h4>\n<div class=\"code-block\"><pre><span class=\"cy\">grep</span> <span class=\"ye\">'minta'</span> <span class=\"gr\">fajl</span>       <span class=\"cm\"># minta sorai</span>\n<span class=\"cy\">grep</span> <span class=\"ye\">-v</span> <span class=\"gr\">'minta'</span>       <span class=\"cm\"># -v: NEM egyező sorok</span>\n<span class=\"cy\">grep</span> <span class=\"ye\">-n</span> <span class=\"gr\">'minta'</span>       <span class=\"cm\"># -n: sorszámmal</span>\n<span class=\"cy\">grep</span> <span class=\"ye\">-c</span> <span class=\"gr\">'minta'</span>       <span class=\"cm\"># -c: csak a találatok száma</span>\n<span class=\"cy\">grep</span> <span class=\"ye\">-i</span> <span class=\"gr\">'minta'</span>       <span class=\"cm\"># -i: case-insensitive</span>\n<span class=\"cy\">grep</span> <span class=\"ye\">-E</span> <span class=\"gr\">'regex'</span>       <span class=\"cm\"># -E: kiterjesztett ERE</span>\n<span class=\"cy\">grep</span> <span class=\"ye\">-r</span> <span class=\"gr\">'minta' dir/'</span> <span class=\"cm\"># -r: rekurzív keresés</span></pre></div>\n<h4>sed – folyamszerkesztő</h4>\n<div class=\"code-block\"><pre><span class=\"cy\">sed</span> <span class=\"ye\">'s/régi/új/'</span>        <span class=\"cm\"># első előfordulás soronként</span>\n<span class=\"cy\">sed</span> <span class=\"ye\">'s/régi/új/g'</span>       <span class=\"cm\"># összes előfordulás (global)</span>\n<span class=\"cy\">sed</span> <span class=\"ye\">'/minta/d'</span>          <span class=\"cm\"># illeszkedő sorok törlése</span>\n<span class=\"cy\">sed</span> <span class=\"ye\">-n '3,7p'</span>           <span class=\"cm\"># 3-7. sorok kiírása</span>\n<span class=\"cy\">sed</span> <span class=\"ye\">-i 's/foo/bar/g'</span> <span class=\"gr\">f</span> <span class=\"cm\"># in-place szerkesztés!</span></pre></div>\n<h4>awk – mezőfeldolgozás</h4>\n<div class=\"code-block\"><pre><span class=\"cm\"># awk 'feltétel { akció }' fájl</span>\n<span class=\"cy\">awk</span> <span class=\"ye\">'{print $1}'</span>           <span class=\"cm\"># első mező ($1, $2... $NF)</span>\n<span class=\"cy\">awk</span> <span class=\"ye\">'{print $NF}'</span>          <span class=\"cm\"># utolsó mező (NF = mezők száma)</span>\n<span class=\"cy\">awk</span> <span class=\"ye\">-F: '{print $1}'</span>      <span class=\"cm\"># : elválasztóval</span>\n<span class=\"cy\">awk</span> <span class=\"ye\">'/minta/ {print $2}'</span>  <span class=\"cm\"># feltételes</span>\n<span class=\"cy\">awk</span> <span class=\"ye\">'{s+=$1} END{print s}'</span> <span class=\"cm\"># összegzés</span>\n<span class=\"cy\">awk</span> <span class=\"ye\">'NR>5'</span>                 <span class=\"cm\"># 5. sortól</span></pre></div>\n<h4>Kombinált példa</h4>\n<div class=\"code-block\"><pre><span class=\"cm\"># Felhasználónevek az /etc/passwd-ból, UID szerint rendezve</span>\n<span class=\"cy\">cat</span> <span class=\"gr\">/etc/passwd</span> | <span class=\"ye\">grep -v '^#'</span> | <span class=\"pu\">awk -F: '{print $1,$3}'</span> | <span class=\"or\">sort -k2 -n</span></pre></div>",

    "theory": "<h4>Script alapszerkezete</h4>\n<div class=\"code-block\"><pre><span class=\"ye\">#!/bin/bash</span>            <span class=\"cm\"># shebang – melyik interpreter futtatja</span>\n\n<span class=\"cm\"># Változók – nincs szóköz az = körül!</span>\nnev=<span class=\"gr\">\"Vilmos\"</span>\nszam=<span class=\"gr\">42</span>\necho <span class=\"gr\">\"Szia, $nev! Szám: ${szam}.\"</span>\n\n<span class=\"cm\"># Speciális paraméterek</span>\n<span class=\"ye\">$0</span>    <span class=\"cm\"># script neve</span>\n<span class=\"ye\">$1</span> <span class=\"ye\">$2</span> <span class=\"cm\"># argumentumok</span>\n<span class=\"ye\">$#</span>    <span class=\"cm\"># argumentumok száma</span>\n<span class=\"ye\">$?</span>    <span class=\"cm\"># utolsó parancs exit kódja</span>\n<span class=\"ye\">$$</span>    <span class=\"cm\"># script PID-je</span>\n<span class=\"ye\">$@</span>    <span class=\"cm\"># összes argumentum (idézőjellel biztonságos)</span></pre></div>\n<h4>if / elif / else</h4>\n<div class=\"code-block\"><pre>if [[ <span class=\"ye\">$1</span> -gt 10 ]]; then\n  echo \"nagy\"\nelif [[ <span class=\"ye\">$1</span> -eq 10 ]]; then\n  echo \"tíz\"\nelse\n  echo \"kis\"\nfi\n\n<span class=\"cm\"># Fájlellenőrzések:</span>\n[[ <span class=\"ye\">-f</span> \"$1\" ]] && echo \"fájl\"    <span class=\"cm\"># -f: regular file</span>\n[[ <span class=\"ye\">-d</span> \"$1\" ]] && echo \"könyvtár\" <span class=\"cm\"># -d: directory</span>\n[[ <span class=\"ye\">-z</span> \"$v\" ]] && echo \"üres\"     <span class=\"cm\"># -z: zero length</span>\n[[ <span class=\"ye\">-n</span> \"$v\" ]] && echo \"nem üres\" <span class=\"cm\"># -n: non-zero</span></pre></div>\n<h4>Ciklusok</h4>\n<div class=\"code-block\"><pre><span class=\"cm\"># for – lista</span>\nfor x in alma korte szilva; do\n  echo \"$x\"\ndone\n\n<span class=\"cm\"># for – C-stílusú</span>\nfor ((i=1; i<=10; i++)); do echo $i; done\n\n<span class=\"cm\"># while</span>\nn=0\nwhile [[ $n -lt 5 ]]; do\n  echo $n; ((n++))\ndone\n\n<span class=\"cm\"># case</span>\ncase \"$1\" in\n  start) echo \"indul\" ;;\n  stop)  echo \"áll\"   ;;\n  *)     echo \"?\"     ;;\nesac</pre></div>\n<h4>Aritmetika</h4>\n<div class=\"code-block\"><pre>((x = 5 + 3))           <span class=\"cm\"># x = 8</span>\nresult=$((10 * 4))       <span class=\"cm\"># result = 40</span>\necho $((2**8))           <span class=\"cm\"># 256 (hatvány)</span>\n\n<span class=\"cm\"># Összehasonlítás (test / [[ ]]):</span>\n<span class=\"ye\">-eq</span> <span class=\"cm\">egyenlő</span>  <span class=\"ye\">-ne</span> <span class=\"cm\">nem egyenlő</span>\n<span class=\"ye\">-lt</span> <span class=\"cm\">kisebb</span>   <span class=\"ye\">-le</span> <span class=\"cm\">kisebb v. egyenlő</span>\n<span class=\"ye\">-gt</span> <span class=\"cm\">nagyobb</span>  <span class=\"ye\">-ge</span> <span class=\"cm\">nagyobb v. egyenlő</span></pre></div>",

    "sub": "inode, jogosultságok, chmod, hard link, symlink, rendszerkönyvtárak",
    "theory": "<h4>Az inode</h4>\n<p>Minden fájlhoz tartozik egy <b>inode</b> bejegyzés a fájlrendszerben. Ez tartalmazza a <b>metaadatokat</b>: méret, jogosultságok, tulajdonos, módosítási idő, lemezblokk-címek. A <b>fájlnév</b> egy könyvtárbejegyzés, amely az inode számra mutat – az inode nem tartalmazza a nevet!</p>\n<h4>Jogosultságok</h4>\n<div class=\"code-block\"><pre><span class=\"cm\">ls -l kimenete:</span>\n<span class=\"gr\">-rwxr-xr--</span> 2 user group 4096 jan 1 file.sh\n <span class=\"cy\">uuu</span><span class=\"ye\">ggg</span><span class=\"pu\">ooo</span>   <span class=\"cm\">(user / group / others)</span>\n\n<span class=\"cm\">r = olvasás (4)   w = írás (2)   x = végrehajtás (1)</span>\n<span class=\"cm\">rwx = 4+2+1 = 7   r-x = 4+0+1 = 5   r-- = 4+0+0 = 4</span></pre></div>\n<h4>chmod</h4>\n<div class=\"code-block\"><pre><span class=\"cy\">chmod</span> <span class=\"ye\">755</span> <span class=\"gr\">script.sh</span>   <span class=\"cm\"># rwxr-xr-x</span>\n<span class=\"cy\">chmod</span> <span class=\"ye\">644</span> <span class=\"gr\">file.txt</span>    <span class=\"cm\"># rw-r--r--</span>\n<span class=\"cy\">chmod</span> <span class=\"ye\">u+x</span> <span class=\"gr\">file</span>        <span class=\"cm\"># user: végrehajtás +</span>\n<span class=\"cy\">chmod</span> <span class=\"ye\">go-w</span> <span class=\"gr\">file</span>       <span class=\"cm\"># group+others: írás -</span>\n<span class=\"cy\">chmod</span> <span class=\"ye\">a=r</span> <span class=\"gr\">file</span>        <span class=\"cm\"># mindenki: csak olvasás</span></pre></div>\n<h4>Hard link vs Symlink</h4>\n<div class=\"code-block\"><pre><span class=\"cy\">ln</span> <span class=\"gr\">eredeti link</span>         <span class=\"cm\"># hard link – azonos inode!</span>\n<span class=\"cy\">ln</span> <span class=\"ye\">-s</span> <span class=\"gr\">eredeti link</span>     <span class=\"cm\"># symbolic link – mutató az eredetire</span></pre></div>\n<div class=\"note info\"><span>💡</span><p><b>Hard link:</b> az inode link-számlálója nő; az adat addig él, amíg van legalább egy hivatkozás. <b>Symlink:</b> csak az elérési utat tárolja; ha az eredeti törlődik → érvénytelen (dangling) link lesz.</p></div>\n<h4>Fontos rendszerkönyvtárak</h4>\n<div class=\"code-block\"><pre><span class=\"gr\">/bin</span>   <span class=\"cm\"># alapvető programok (ls, cp, bash...)</span>\n<span class=\"gr\">/sbin</span>  <span class=\"cm\"># adminisztrációs programok (mount, fsck...)</span>\n<span class=\"gr\">/etc</span>   <span class=\"cm\"># konfigurációs fájlok (/etc/passwd, /etc/fstab)</span>\n<span class=\"gr\">/home</span>  <span class=\"cm\"># felhasználók home könyvtárai</span>\n<span class=\"gr\">/tmp</span>   <span class=\"cm\"># ideiglenes fájlok (újraindítás után törlődhet)</span>\n<span class=\"gr\">/var</span>   <span class=\"cm\"># változó adatok (logok: /var/log, mail, spool)</span>\n<span class=\"gr\">/proc</span>  <span class=\"cm\"># virtuális fs – kernel és folyamat info</span>\n<span class=\"gr\">/dev</span>   <span class=\"cm\"># eszközfájlok (sda, tty, null, urandom)</span>\n<span class=\"gr\">/usr</span>   <span class=\"cm\"># felhasználói programok, lib-ek, man oldalak</span></pre></div>",

  {
    "id": 8,
    "title": "Folyamatok alapjai",
    "sub": "Program vs folyamat, PID/PPID, állapotok, task_struct, zombie",
    "theory": "<h4>Program vs Folyamat</h4>\n<p>A <b>program</b> egy lemezen lévő végrehajtható fájl (statikus). A <b>folyamat</b> egy futó program példánya (dinamikus) – saját memóriaterülettel, fájlleírókkal, PID-del rendelkezik.</p>\n<h4>task_struct – a folyamat leírója</h4>\n<p>A Linux kernel minden folyamatot egy <code>task_struct</code> C struktúrában tart nyilván. Tartalmazza:</p>\n<ul>\n<li><b>PID</b> – egyedi folyamatazonosító</li>\n<li><b>PPID</b> – szülő folyamat PID-je</li>\n<li><b>Állapot</b> – RUNNING, SLEEPING, ZOMBIE...</li>\n<li>Memória-leíró (mm_struct), fájlleíró tábla, signal maszk, ütemező adatok</li>\n</ul>\n<h4>Folyamatállapotok</h4>\n<div class=\"code-block\"><pre><span class=\"gr\">R – Running</span>    <span class=\"cm\"># fut vagy futásra kész (CPU-n van)</span>\n<span class=\"cy\">S – Sleeping</span>   <span class=\"cm\"># eseményre vár – megszakítható</span>\n<span class=\"cy\">D – Sleeping</span>   <span class=\"cm\"># megszakíthatatlan (pl. lemez I/O)</span>\n<span class=\"ye\">T – Stopped</span>    <span class=\"cm\"># SIGSTOP-pal leállítva (Ctrl+Z)</span>\n<span class=\"re\">Z – Zombie</span>     <span class=\"cm\"># befejezte, szülő még nem olvasta ki exit kódot</span></pre></div>\n<h4>Hasznos parancsok</h4>\n<div class=\"code-block\"><pre><span class=\"cy\">ps</span> <span class=\"ye\">aux</span>          <span class=\"cm\"># összes folyamat részletesen</span>\n<span class=\"cy\">ps</span> <span class=\"ye\">-ef</span>          <span class=\"cm\"># Unix formátum, PPID is látható</span>\n<span class=\"cy\">top</span> / <span class=\"cy\">htop</span>      <span class=\"cm\"># élő figyelő</span>\n<span class=\"cy\">kill</span> <span class=\"ye\">-9</span> PID     <span class=\"cm\"># SIGKILL – azonnali leállítás</span>\n<span class=\"cy\">kill</span> <span class=\"ye\">-15</span> PID    <span class=\"cm\"># SIGTERM – elegáns leállítás kérése</span>\n<span class=\"cy\">pgrep</span> <span class=\"gr\">bash</span>      <span class=\"cm\"># bash nevű folyamatok PID-jei</span>\n<span class=\"cy\">pstree</span>          <span class=\"cm\"># folyamat-fa</span></pre></div>\n<div class=\"note warn\"><span>⚠</span><p><b>Zombie folyamat:</b> nem fogyaszt CPU-t, de tartja a PID-et a folyamattáblában. Megoldás: a szülő hívjon wait()-et!</p></div>",

    "theory": "<h4>Mi az exec?</h4>\n<p>Az <code>exec</code> lecseréli az aktuális folyamat programját egy másik programra. <b>Nem hoz létre új folyamatot</b> – ugyanaz a PID marad, de a kód, adat, stack teljesen felülíródik az új programmal.</p>\n<div class=\"note warn\"><span>⚠</span><p><b>exec CSAK hiba esetén tér vissza!</b> Ha sikeres, az aktuális kód folytatása soha nem hajtódik végre.</p></div>\n<h4>A névcsoport logikája</h4>\n<div class=\"code-block\"><pre><span class=\"cm\">// l = list   (argumentumok felsorolva, NULL-lal zárva)</span>\n<span class=\"cm\">// v = vector (argumentumok char* tömbként)</span>\n<span class=\"cm\">// p = path   (PATH-ban keresi a programot)</span>\n<span class=\"cm\">// e = env    (egyéni környezeti változók)</span>\n\n<span class=\"cy\">execl</span> (<span class=\"gr\">\"/bin/ls\"</span>, <span class=\"gr\">\"ls\"</span>, <span class=\"gr\">\"-la\"</span>, <span class=\"re\">NULL</span>);\n<span class=\"cy\">execlp</span>(<span class=\"gr\">\"ls\"</span>,      <span class=\"gr\">\"ls\"</span>, <span class=\"gr\">\"-la\"</span>, <span class=\"re\">NULL</span>);   <span class=\"cm\">// PATH-ban keres</span>\n\nchar *args[] = { <span class=\"gr\">\"ls\"</span>, <span class=\"gr\">\"-la\"</span>, <span class=\"re\">NULL</span> };\n<span class=\"cy\">execv</span> (<span class=\"gr\">\"/bin/ls\"</span>, args);\n<span class=\"cy\">execvp</span>(<span class=\"gr\">\"ls\"</span>,      args);                <span class=\"cm\">// PATH-ban keres</span>\n\nchar *env[] = { <span class=\"gr\">\"PATH=/bin\"</span>, <span class=\"re\">NULL</span> };\n<span class=\"cy\">execle</span>(<span class=\"gr\">\"/bin/ls\"</span>, <span class=\"gr\">\"ls\"</span>, <span class=\"re\">NULL</span>, env);   <span class=\"cm\">// saját env</span>\n<span class=\"cy\">execve</span>(<span class=\"gr\">\"/bin/ls\"</span>, args, env);          <span class=\"cm\">// saját env + vector</span></pre></div>\n<h4>fork + exec – a klasszikus minta</h4>\n<div class=\"code-block\"><pre>pid_t pid = <span class=\"gr\">fork()</span>;\nif (pid == 0) {\n    <span class=\"cm\">/* gyerekfolyamat – lefuttatja az új programot */</span>\n    <span class=\"cy\">execlp</span>(<span class=\"gr\">\"ls\"</span>, <span class=\"gr\">\"ls\"</span>, <span class=\"gr\">\"-la\"</span>, <span class=\"re\">NULL</span>);\n    perror(\"exec hiba\");   <span class=\"cm\">// ide csak hiba esetén jut</span>\n    _exit(1);\n} else {\n    <span class=\"gr\">wait(NULL)</span>;            <span class=\"cm\">// szülő megvárja</span>\n}</pre></div>",

iv>\n<div class=\"note info\"><span>🔄</span><p><b>Kliens-szerver minta:</b> Server létrehozza a <code>server_fifo</code>-t. Kliens létrehozza saját <code>fifo_&lt;PID&gt;</code>-jét, beleírja a kérést + saját PID-jét. Server feldolgozza, megnyitja a kliens FIFO-ját, visszaírja a választ.</p></div>",

const ED={};
let CUR=0;
const PROG=JSON.parse(localStorage.getItem('lxp')||'{}');

function buildNav(){
  const nav=document.getElementById('nav');
  DATA.forEach((t,i)=>{
    const p=PROG[i]||{};
    const tot=t.exercises.length;
    const sol=Object.keys(p).filter(k=>p[k]).length;
    let dc='',di='';
    if(sol===tot&&tot>0){dc='d';di='✓';}
    else if(sol>0){dc='p';di=sol;}
    const b=document.createElement('button');
    b.className='ni'+(i===0?' on':'');
    b.dataset.i=i;
    b.innerHTML=`<span class="ni-n">${String(i+1).padStart(2,'0')}</span>`+
      `<span class="ni-l">${t.title}</span>`+
      `<span class="ni-dot ${dc}">${di}</span>`;
    b.onclick=()=>go(i);
    nav.appendChild(b);
  });
}

function buildPages(){
  const main=document.getElementById('main');
  DATA.forEach((t,ti)=>{
    const p=PROG[ti]||{};
    const sol=Object.keys(p).filter(k=>p[k]).length;
    const d=document.createElement('div');
    d.className='pg'+(ti===0?' on':'');
    d.id='pg'+ti;
    d.innerHTML=`
<div class="ph">
  <div class="p-n">FEJEZET ${String(ti+1).padStart(2,'0')} / ${DATA.length}</div>
  <h1 class="p-t">${t.title}</h1>
  <p class="p-s">${t.sub}</p>
</div>
<div class="th">
  <button class="th-hd${ti===0?' op':''}" onclick="togTh(this)">
    <div class="th-ic">📖</div>
    <span class="th-lb">Elméleti áttekintés</span>
    <span class="th-ar">▾</span>
  </button>
  <div class="th-bd${ti===0?' op':''}">${t.theory}</div>
</div>
<div class="ex-hd"><h3>Feladatok</h3><span class="ex-ct" id="ec${ti}">${sol}/${t.exercises.length} megoldva</span></div>
<div id="el${ti}">${t.exercises.map((e,ei)=>buildEx(e,ti,ei)).join('')}</div>
<div class="nav-btns">
  <button class="btn-nav" onclick="go(${ti-1})" ${ti===0?'disabled':''}>← Előző</button>
  <button class="btn-nav" onclick="go(${ti+1})" ${ti===DATA.length-1?'disabled':''}>Következő →</button>
</div>`;
    main.appendChild(d);
  });
}

function buildEx(e,ti,ei){
  const sol=!!((PROG[ti]||{})[ei]);
  const tcs={cmd:'cmd',bash:'bash',c:'c',regex:'regex',mc:'mc'};
  const tc=tcs[e.type]||'cmd';
  let inp='';
  if(e.type==='mc'){
    inp=`<div class="mc-opts" id="mc${ti}_${ei}">`+
      e.opts.map((o,oi)=>`<button class="mc-o${sol&&oi===e.correct?' ok':''}"
        onclick="chkMC(${ti},${ei},${oi})" ${sol?'disabled':''}>
        <span class="mc-k">${String.fromCharCode(65+oi)}</span>${escH(o)}</button>`).join('')+
      '</div>';
  } else {
    const ml=e.type==='bash'||e.type==='c';
    inp=`<div class="ex-hint">${e.hint?'💡 '+escH(e.hint).replace(/`([^`]+)`/g,'<code>$1</code>'):''}</div>`+
      `<textarea id="ta${ti}_${ei}" class="${ml?'ml':'sl'}">${escH(e.placeholder||'')}</textarea>`+
      `<div class="acts">`+
      `<button class="btn-go" id="cb${ti}_${ei}" onclick="chkEx(${ti},${ei})" ${sol?'disabled':''}>${sol?'✓ Megoldva':'⚡ Ellenőrzés'}</button>`+
      `<button class="btn-tip" onclick="showTip(${ti},${ei})">💡 Tipp</button>`+
      `<button class="btn-rst" onclick="rst(${ti},${ei})">↺</button>`+
      `</div>`;
  }
  return `<div class="ex${sol?' ok':''}" id="ex${ti}_${ei}">
<div class="ex-top">
  <div class="exn ${sol?'s':'p'}" id="en${ti}_${ei}">${sol?'✓':(ei+1)}</div>
  <div class="ex-info">
    <div class="ex-tp ${tc}">${tc.toUpperCase()}</div>
    <div class="ex-q">${escH(e.q).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>')}</div>
  </div>
</div>
<div class="ex-body">${inp}<div class="fb" id="fb${ti}_${ei}"></div></div>
</div>`;
}

function escH(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function togTh(btn){
  btn.classList.toggle('op');
  btn.nextElementSibling.classList.toggle('op');
}

function go(i){
  if(i<0||i>=DATA.length)return;
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg'+i).classList.add('on');
  document.querySelector(`.ni[data-i="${i}"]`).classList.add('on');
  CUR=i;window.scrollTo(0,0);
  if(window.innerWidth<=768)document.getElementById('sb').classList.remove('op');
}

function initEds(){
  DATA.forEach((t,ti)=>{
    t.exercises.forEach((e,ei)=>{
      if(e.type==='mc')return;
      const ta=document.getElementById(`ta${ti}_${ei}`);
      if(!ta)return;
      const sl=e.type!=='bash'&&e.type!=='c';
      const mode=e.type==='c'?'text/x-csrc':'shell';
      const cm=CodeMirror.fromTextArea(ta,{
        mode,theme:'dracula',lineNumbers:!sl,lineWrapping:true,autofocus:false,
        extraKeys:{Enter:sl?()=>chkEx(ti,ei):CodeMirror.Pass}
      });
      if(sl)cm.setSize(null,40);else cm.setSize(null,145);
      ED[`${ti}_${ei}`]=cm;
    });
  });
}

function getVal(ti,ei){
  const k=`${ti}_${ei}`;
  return ED[k]?ED[k].getValue().trim():(document.getElementById(`ta${ti}_${ei}`)||{value:''}).value.trim();
}

function norm(s){return String(s).replace(/\s+/g,' ').trim().replace(/['"]/g,'"');}

function chkMC(ti,ei,chosen){
  const e=DATA[ti].exercises[ei];
  const ok=chosen===e.correct;
  document.querySelectorAll(`#mc${ti}_${ei} .mc-o`).forEach((o,i)=>{
    o.disabled=true;
    if(i===e.correct)o.classList.add('ok');
    else if(i===chosen&&!ok)o.classList.add('ng');
  });
  setFb(ti,ei,ok,(ok?'✓ Helyes! ':'✗ Nem ez. ')+e.exp);
  if(ok)mark(ti,ei);
}

function chkEx(ti,ei){
  const e=DATA[ti].exercises[ei];
  const val=getVal(ti,ei);
  if(!val){setFb(ti,ei,false,'✗ Adj meg egy választ!');return;}
  const btn=document.getElementById(`cb${ti}_${ei}`);
  btn.disabled=true;

  if(e.type==='cmd'){
    const ok=e.accepted.some(a=>norm(val)===norm(a));
    setFb(ti,ei,ok,ok?'✓ '+e.ok:'✗ '+e.err);
    if(ok)mark(ti,ei);else btn.disabled=false;
  } else if(e.type==='regex'){
    chkRegex(ti,ei,val,e);
  } else if(e.type==='bash'||e.type==='c'){
    chkCode(ti,ei,val,e);
  }
}

function chkRegex(ti,ei,pat,e){
  const btn=document.getElementById(`cb${ti}_${ei}`);
  try{
    const stripped=pat.replace(/^\^/,'').replace(/\$$/,'');
    const re=new RegExp('^'+stripped+'$');
    const allM=e.match.every(s=>re.test(s));
    const noneM=e.nomatch.every(s=>!re.test(s));
    if(allM&&noneM){
      setFb(ti,ei,true,'✓ Helyes regex! Illeszkedett: '+e.match.map(s=>`<code>${s}</code>`).join(', '));
      mark(ti,ei);
    } else {
      const fM=e.match.filter(s=>!re.test(s));
      const fN=e.nomatch.filter(s=>re.test(s));
      let msg='✗ Nem teljesen jó. ';
      if(fM.length)msg+='Kellene illeszkednie: '+fM.map(s=>`<code>${s}</code>`).join(', ')+'. ';
      if(fN.length)msg+='Nem kellene: '+fN.map(s=>`<code>${s}</code>`).join(', ')+'.';
      setFb(ti,ei,false,msg);btn.disabled=false;
    }
  }catch(err){setFb(ti,ei,false,'✗ Érvénytelen regex: '+err.message);btn.disabled=false;}
}

function chkCode(ti,ei,val,e){
  const btn=document.getElementById(`cb${ti}_${ei}`);
  const missing=[];
  const ok=e.checks.every(ch=>{
    const hit=new RegExp(ch.re,'i').test(val);
    if(!hit)missing.push(ch.msg);
    return hit;
  });
  if(ok){setFb(ti,ei,true,'✓ '+e.ok);mark(ti,ei);}
  else{setFb(ti,ei,false,'✗ Még nem teljes:<br>• '+missing.join('<br>• '));btn.disabled=false;}
}

function showTip(ti,ei){
  const e=DATA[ti].exercises[ei];
  const fb=document.getElementById(`fb${ti}_${ei}`);
  fb.className='fb on tip';
  fb.innerHTML='💡 '+(e.hint||'Nézd meg az elméleti részt!').replace(/`([^`]+)`/g,'<code>$1</code>');
}

function setFb(ti,ei,ok,msg){
  const fb=document.getElementById(`fb${ti}_${ei}`);
  fb.className='fb on '+(ok?'ok':'er');
  fb.innerHTML=msg;
}

function mark(ti,ei){
  if(!PROG[ti])PROG[ti]={};
  PROG[ti][ei]=true;
  localStorage.setItem('lxp',JSON.stringify(PROG));
  const en=document.getElementById(`en${ti}_${ei}`);
  if(en){en.className='exn s';en.textContent='✓';}
  document.getElementById(`ex${ti}_${ei}`)?.classList.add('ok');
  const btn=document.getElementById(`cb${ti}_${ei}`);
  if(btn){btn.disabled=true;btn.innerHTML='✓ Megoldva';}
  updProg();updNav(ti);
}

function rst(ti,ei){
  if(PROG[ti])delete PROG[ti][ei];
  localStorage.setItem('lxp',JSON.stringify(PROG));
  const en=document.getElementById(`en${ti}_${ei}`);
  if(en){en.className='exn p';en.textContent=ei+1;}
  document.getElementById(`ex${ti}_${ei}`)?.classList.remove('ok');
  const btn=document.getElementById(`cb${ti}_${ei}`);
  if(btn){btn.disabled=false;btn.innerHTML='⚡ Ellenőrzés';}
  const fb=document.getElementById(`fb${ti}_${ei}`);
  if(fb)fb.className='fb';
  const k=`${ti}_${ei}`;
  if(ED[k])ED[k].setValue(DATA[ti].exercises[ei].placeholder||'');
  const mc=document.getElementById(`mc${ti}_${ei}`);
  if(mc)mc.querySelectorAll('.mc-o').forEach(o=>{o.disabled=false;o.classList.remove('ok','ng');});
  updProg();updNav(ti);
}

function updProg(){
  let tot=0,sol=0;
  DATA.forEach((t,ti)=>{
    tot+=t.exercises.length;
    sol+=Object.keys(PROG[ti]||{}).filter(k=>PROG[ti][k]).length;
  });
  const pct=tot?Math.round(sol/tot*100):0;
  document.getElementById('pbf').style.width=pct+'%';
  document.getElementById('pbt').textContent=`${pct}% · ${sol}/${tot} feladat megoldva`;
}

function updNav(ti){
  const t=DATA[ti];
  const p=PROG[ti]||{};
  const tot=t.exercises.length;
  const sol=Object.keys(p).filter(k=>p[k]).length;
  const dot=document.querySelector(`.ni[data-i="${ti}"] .ni-dot`);
  if(!dot)return;
  if(sol===tot&&tot>0){dot.className='ni-dot d';dot.textContent='✓';}
  else if(sol>0){dot.className='ni-dot p';dot.textContent=sol;}
  else{dot.className='ni-dot';dot.textContent='';}
  const ec=document.getElementById('ec'+ti);
  if(ec)ec.textContent=`${sol}/${tot} megoldva`;
}

buildNav();buildPages();
setTimeout(initEds,60);
updProg();

</script>
</body>
