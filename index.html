<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux & OS alapok – Interaktív tananyag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<style>
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1d27;--bg4:#22263a;
  --border:#2a2e42;--border2:#363b55;
  --text:#e4e6f0;--text2:#8b90a8;--text3:#5a5f78;
  --accent:#7c6af7;--accent2:#9d8ff9;
  --green:#3dd68c;--green2:#2aaf72;
  --red:#f55f6d;--yellow:#f5c842;--cyan:#38d9f5;--orange:#f5874a;
  --mono:'JetBrains Mono',monospace;--head:'Syne',sans-serif;
  --sw:280px;--r:8px;--rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--mono);background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px;line-height:1.65;overflow-x:hidden}

/* SIDEBAR */
#sb{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100;overflow:hidden}
.sb-hd{padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo{font-family:var(--head);font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.sb-logo-i{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;flex-shrink:0}
.sb-prog{margin-top:12px}
.sb-pbar{height:3px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-top:6px}
.sb-pfill{height:100%;background:var(--green);border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%}
.sb-ptxt{font-size:11px;color:var(--text3)}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.ni{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;transition:background .15s;position:relative;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--bg3)}
.ni.active{background:var(--bg4);color:var(--accent2)}
.ni.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.ni-num{font-size:10px;color:var(--text3);width:18px;flex-shrink:0}
.ni.active .ni-num{color:var(--accent)}
.ni-lbl{font-size:12px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni.active .ni-lbl{color:var(--accent2)}
.ni-chk{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .3s}
.ni-chk.done{background:var(--green);border-color:var(--green);color:#fff}
.ni-chk.part{border-color:var(--yellow);background:rgba(245,200,66,.15);color:var(--yellow);font-size:10px}

/* MAIN */
#main{margin-left:var(--sw);flex:1;min-height:100vh}
.page{display:none;max-width:860px;margin:0 auto;padding:48px 40px 80px;animation:fi .25s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ph{margin-bottom:32px}
.p-num{font-size:11px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.p-title{font-family:var(--head);font-size:28px;font-weight:800;color:var(--text);line-height:1.2;letter-spacing:-.03em}
.p-sub{margin-top:8px;font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

/* THEORY */
.th-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:28px;overflow:hidden}
.th-tog{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;user-select:none;background:none;border:none;width:100%;color:var(--text);transition:background .15s}
.th-tog:hover{background:var(--bg3)}
.th-icon{width:28px;height:28px;background:rgba(124,106,247,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.th-lbl{flex:1;font-family:var(--head);font-size:14px;font-weight:600;text-align:left}
.th-arr{font-size:12px;color:var(--text3);transition:transform .25s}
.th-tog.open .th-arr{transform:rotate(180deg)}
.th-body{padding:0 20px 20px;border-top:1px solid var(--border);display:none}
.th-body.open{display:block}
.th-body h4{font-family:var(--head);font-size:13px;font-weight:700;color:var(--accent2);margin:18px 0 8px;text-transform:uppercase;letter-spacing:.05em}
.th-body p{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:10px}
.th-body ul{margin:0 0 12px 4px;list-style:none}
.th-body ul li{font-size:13px;color:var(--text2);line-height:1.75;padding-left:14px;position:relative}
.th-body ul li::before{content:'→';position:absolute;left:0;color:var(--accent);font-size:11px}
code{font-family:var(--mono);background:var(--bg4);color:var(--cyan);padding:1px 6px;border-radius:4px;font-size:12px}
.cb{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:12px 0;overflow-x:auto}
.cb pre{font-family:var(--mono);font-size:12px;color:var(--text);line-height:1.7;white-space:pre}
.cb pre .c{color:var(--cyan)}.cb pre .g{color:var(--green)}.cb pre .y{color:var(--yellow)}
.cb pre .a{color:var(--accent2)}.cb pre .d{color:var(--text2)}.cb pre .r{color:var(--red)}.cb pre .o{color:var(--orange)}
.ib{display:flex;gap:10px;background:rgba(124,106,247,.08);border:1px solid rgba(124,106,247,.25);border-radius:var(--r);padding:12px 14px;margin:12px 0}
.ib .ii{font-size:16px;flex-shrink:0;margin-top:1px}
.ib .it{font-size:12px;color:var(--text2);line-height:1.7}
.ib .it strong{color:var(--accent2);font-weight:500}
.wb{display:flex;gap:10px;background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.2);border-radius:var(--r);padding:12px 14px;margin:12px 0}
.wb .it{font-size:12px;color:var(--text2);line-height:1.7}
.wb .it strong{color:var(--yellow);font-weight:500}

/* EXERCISES */
.ex-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ex-hd h3{font-family:var(--head);font-size:16px;font-weight:700;color:var(--text)}
.ex-cnt{font-size:11px;color:var(--text3)}
.ex{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:16px;overflow:hidden;transition:border-color .3s}
.ex.solved{border-color:var(--green2)}
.ex.solved .ex-h{background:rgba(61,214,140,.04)}
.ex-h{padding:14px 18px;display:flex;align-items:flex-start;gap:12px}
.ex-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.ex-badge.p{background:var(--bg4);color:var(--text3)}
.ex-badge.s{background:var(--green);color:#0d1a12}
.ex-badge.e{background:var(--red);color:#fff}
.ex-meta{flex:1}
.ex-type{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px}
.tc{color:var(--cyan)}.to{color:var(--orange)}.ty{color:var(--yellow)}.ta{color:var(--accent2)}
.ex-q{font-size:14px;color:var(--text);line-height:1.6}
.ex-b{padding:0 18px 16px;border-top:1px solid var(--border)}
.ex-hint{font-size:12px;color:var(--text3);padding:10px 0 8px;line-height:1.6}
.ex-hint code{color:var(--yellow);font-size:11px}
.CodeMirror{font-family:var(--mono)!important;font-size:13px!important;border-radius:var(--r)!important;border:1px solid var(--border)!important;height:auto!important}
.CodeMirror-scroll{min-height:38px}
.CodeMirror-focused{border-color:var(--accent)!important}
.sl .CodeMirror-scroll{max-height:42px;overflow:hidden!important}
.ml .CodeMirror-scroll{min-height:130px}
.ex-act{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.btn-c{padding:7px 18px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-c:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-c:active{transform:translateY(0)}
.btn-c:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-h{padding:7px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--text3);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s}
.btn-h:hover{border-color:var(--yellow);color:var(--yellow)}
.btn-r{padding:7px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--text3);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s;margin-left:auto}
.btn-r:hover{color:var(--text2)}
.fb{margin-top:10px;border-radius:var(--r);padding:12px 14px;font-size:12px;line-height:1.7;display:none;animation:fi .2s ease}
.fb.show{display:block}
.fb.ok{background:rgba(61,214,140,.08);border:1px solid rgba(61,214,140,.25);color:#6ee8a8}
.fb.err{background:rgba(245,95,109,.08);border:1px solid rgba(245,95,109,.25);color:#f8a3aa}
.fb.hint{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.2);color:var(--yellow)}
.fb code{background:rgba(255,255,255,.08);color:inherit;font-size:12px}
.mc-opts{display:flex;flex-direction:column;gap:6px;padding:8px 0}
.mc-opt{padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-family:var(--mono);font-size:13px;color:var(--text2);transition:all .15s;text-align:left;display:flex;gap:10px;align-items:flex-start}
.mc-opt:hover:not(:disabled){border-color:var(--accent);color:var(--text);background:var(--bg4)}
.mc-opt.ok{border-color:var(--green);color:var(--green);background:rgba(61,214,140,.06)}
.mc-opt.ng{border-color:var(--red);color:var(--red);background:rgba(245,95,109,.06)}
.mc-opt:disabled{cursor:default}
.mc-k{background:var(--bg4);border-radius:4px;padding:0 6px;font-size:11px;color:var(--text3);flex-shrink:0;min-width:22px;text-align:center}
.pg-nav{display:flex;justify-content:space-between;margin-top:40px;padding-top:24px;border-top:1px solid var(--border)}
.btn-nav{padding:9px 18px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.btn-nav:hover{border-color:var(--accent);color:var(--accent2)}
.btn-nav:disabled{opacity:.3;cursor:not-allowed}
#mbt{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:36px;height:36px;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2)}
/* score badge */
.score-wrap{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.score-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;flex:1;min-width:100px}
.score-card .sv{font-size:22px;font-weight:500;color:var(--text)}
.score-card .sl{font-size:11px;color:var(--text3);margin-top:2px}
@media(max-width:768px){
  #sb{transform:translateX(-100%);transition:transform .3s}
  #sb.open{transform:translateX(0)}
  #main{margin-left:0}
  #mbt{display:flex}
  .page{padding:60px 20px 60px}
}
</style>
</head>
<body>
<button id="mbt" onclick="document.getElementById('sb').classList.toggle('open')">☰</button>
<nav id="sb">
  <div class="sb-hd">
    <div class="sb-logo"><div class="sb-logo-i">λ</div>Linux & OS</div>
    <div class="sb-prog">
      <div class="sb-ptxt" id="ptxt">0 / 13 fejezet · 0 megoldva</div>
      <div class="sb-pbar"><div class="sb-pfill" id="pfill"></div></div>
    </div>
  </div>
  <div class="sb-nav" id="nav"></div>
</nav>
<main id="main"></main>
<script>
// ══════════════════════════════════════════════════════
//  ADATOK – 13 fejezet
//  checkFn lehetséges értékek:
//   exact   – progress[expected] tartalmazza a választ
//   any     – progress[expected] bármelyikére illeszt
//   regex   – testCases.match / nomatch alapján
//   multi   – multiple choice
//   code    – patterns: [[re1,re2,...], [re3,...], ...]
//             minden belső tömb OR, a külső tömbök AND
// ══════════════════════════════════════════════════════
const T=[
{id:1,title:"OS alapjai",sub:"Kernel, shell, Linux felépítése, CLI gondolkodás",
theory:`<h4>Mi az operációs rendszer?</h4>
<p>Az operációs rendszer közvetít a hardver és az alkalmazások között. Kezeli a memóriát, a processzort, a fájlrendszert és az I/O eszközöket.</p>
<div class="ib"><span class="ii">💡</span><div class="it"><strong>Analógia:</strong> az OS mint egy étterem menedzsere – te (az alkalmazás) csak a pincérnek (API) szólsz, ő szervezi a konyhát (hardver).</div></div>
<h4>A Linux rétegei</h4>
<div class="cb"><pre><span class="a">Felhasználói tér</span>  │ bash, python, vim, Firefox...
─────────────────┼──────────────────────────────
<span class="c">Shell / libc</span>     │ rendszerhívások burkolata
─────────────────┼──────────────────────────────
<span class="g">Kernel</span>           │ ütemező, memóriakezelés, driverek
─────────────────┼──────────────────────────────
<span class="y">Hardver</span>          │ CPU, RAM, HDD, NIC...</pre></div>
<h4>Kernel vs Shell</h4>
<ul>
<li><strong>Kernel:</strong> a Linux magja. Közvetlenül kezeli a hardvert. Ring 0 (privilegizált mód).</li>
<li><strong>Shell:</strong> parancsértelmező. Kernellel rendszerhívásokon keresztül kommunikál. Típusok: <code>bash</code>, <code>zsh</code>, <code>sh</code>, <code>fish</code>.</li>
</ul>
<h4>CLI gondolkodás: kis parancsok + pipe</h4>
<p>Unix-filozófia: minden program egyetlen dolgot csináljon jól, szöveget vegyen be és adjon ki. A <code>|</code> pipe összeköti őket.</p>
<div class="cb"><pre><span class="d"># Ki van bejelentkezve és hányan?</span>
<span class="c">who</span> | <span class="g">wc -l</span>

<span class="d"># Legtöbbet használt 5 parancs</span>
<span class="c">history</span> | <span class="g">awk '{print $2}'</span> | <span class="y">sort</span> | <span class="a">uniq -c</span> | <span class="o">sort -rn</span> | <span class="r">head -5</span></pre></div>
<div class="wb"><span class="ii">⚠</span><div class="it"><strong>Fontos:</strong> Linux <strong>case-sensitive</strong> – a <code>Fajl.txt</code> és <code>fajl.txt</code> két különböző fájl.</div></div>`,
exercises:[
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"Mi a Linux kernel feladata?",
opts:["Szöveges parancsokat értelmez és futtat","Közvetlenül kezeli a hardvert és az erőforrásokat","Weboldalakat jelenít meg","A bash shell másik neve"],
correct:1,exp:"A kernel (mag) a hardverrel kommunikál, kezeli a memóriát, CPU ütemezést, drivereket. A shell (bash stb.) felette fut."},
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"Melyik állítás igaz a CLI gondolkodásra?",
opts:["Egy nagy program mindent tud csinálni","Minden programnak GUI-ja kell","Kis programok kimenetét | összeköti a következő bemenetével","A pipe csak bash-ben működik"],
correct:2,exp:"Unix-filozófia: sok kis program, mindegyik egy dolgot csinál jól. A | összeköti: egyik kimenet a másik bemenete."},
{type:"exact",typeLabel:"PARANCS",q:"Írd meg a parancsot, amely kiírja az aktuálisan futó shell teljes elérési útját (a $SHELL változó értékét)!",
hint:"Változók értékét az echo paranccsal lehet kiírni, a változó neve elé $ kell.",
placeholder:"echo ...",
expected:["echo $SHELL","echo ${SHELL}"],
okMsg:"Tökéletes! Az echo kiírja a $SHELL változó értékét, ami pl. /bin/bash.",
errMsg:"Próbáld újra. Az echo parancs után $ jellel kell hivatkozni a változóra: echo $SHELL"}
]},

{id:2,title:"Shell parancsok",sub:"Alapparancsok, formátum, man, whatis, útvonalak",
theory:`<h4>Parancsok formátuma</h4>
<div class="cb"><pre><span class="c">parancsnév</span> <span class="y">[opciók]</span> <span class="g">[argumentumok]</span>

<span class="c">ls</span> <span class="y">-la</span> <span class="g">/home/user</span>
<span class="c">cp</span> <span class="y">-r</span> <span class="g">forras/ cel/</span>
<span class="c">chmod</span> <span class="y">u+x</span> <span class="g">script.sh</span></pre></div>
<h4>Nélkülözhetetlen parancsok</h4>
<div class="cb"><pre><span class="c">ls</span> <span class="y">-la</span>            <span class="d"># listázás részletesen + rejtett fájlok</span>
<span class="c">cd</span> <span class="g">/var/log</span>       <span class="d"># könyvtárváltás</span>
<span class="c">pwd</span>              <span class="d"># aktuális könyvtár kiírása</span>
<span class="c">cp</span> <span class="y">-r</span> <span class="g">src/ dst/</span>  <span class="d"># rekurzív másolás</span>
<span class="c">mv</span> <span class="g">old new</span>       <span class="d"># átnevezés / mozgatás</span>
<span class="c">rm</span> <span class="y">-rf</span> <span class="g">dir/</span>      <span class="d"># ⚠ rekurzív törlés!</span>
<span class="c">mkdir</span> <span class="y">-p</span> <span class="g">a/b/c</span>  <span class="d"># könyvtárlánc létrehozása</span>
<span class="c">touch</span> <span class="g">file.txt</span>   <span class="d"># üres fájl létrehozása</span>
<span class="c">cat</span> <span class="g">file.txt</span>     <span class="d"># fájl tartalmának kiírása</span>
<span class="c">less</span> <span class="g">file.txt</span>    <span class="d"># lapozható megjelenítés (q = kilép)</span></pre></div>
<h4>Segítség kérése</h4>
<div class="cb"><pre><span class="c">man</span> <span class="g">ls</span>           <span class="d"># teljes kézikönyv (q = kilép)</span>
<span class="c">whatis</span> <span class="g">grep</span>     <span class="d"># egy soros leírás</span>
<span class="c">apropos</span> <span class="g">copy</span>    <span class="d"># parancsok keresése kulcsszó alapján</span>
<span class="c">ls</span> <span class="y">--help</span>       <span class="d"># rövid súgó</span></pre></div>
<h4>Útvonalak</h4>
<div class="cb"><pre><span class="g">/</span>          <span class="d"># gyökér (root directory)</span>
<span class="g">~</span>          <span class="d"># home könyvtár ($HOME)</span>
<span class="g">.</span>          <span class="d"># aktuális könyvtár</span>
<span class="g">..</span>         <span class="d"># szülő könyvtár</span>

<span class="d"># Abszolút út (/-el kezdődik):</span>
<span class="g">/home/user/projekt/main.c</span>

<span class="d"># Relatív út (aktuális könyvtártól):</span>
<span class="g">projekt/main.c</span></pre></div>`,
exercises:[
{type:"any",typeLabel:"PARANCS",q:"Listázd ki az aktuális könyvtár összes fájlját (rejtettekkel együtt), részletes formátumban!",
hint:"Az ls -l opciója részletes (long) listát, -a a rejtetteket is mutatja. Kombinálhatók: -la",
placeholder:"ls ...",

{id:3,title:"Metakarakterek & átirányítás",sub:">, >>, <, |, 2>, 2>&1, *, ?, [], idézőjelek",
theory:`<h4>Átirányítás</h4>
<div class="cb"><pre><span class="c">parancs</span> <span class="y">></span>  <span class="g">fajl</span>    <span class="d"># stdout → fájl (felülír)</span>
<span class="c">parancs</span> <span class="y">>></span> <span class="g">fajl</span>    <span class="d"># stdout → fájl (hozzáfűz)</span>
<span class="c">parancs</span> <span class="y"><</span>  <span class="g">fajl</span>    <span class="d"># stdin ← fájl</span>
<span class="c">parancs</span> <span class="y">2></span> <span class="g">fajl</span>    <span class="d"># stderr → fájl</span>
<span class="c">parancs</span> <span class="y">2>&1</span>        <span class="d"># stderr → ugyanoda, mint stdout</span>
<span class="c">parancs</span> <span class="y">>/dev/null 2>&1</span>  <span class="d"># minden kimenet eldobása</span></pre></div>
<h4>Pipeline (|)</h4>
<div class="cb"><pre><span class="d"># Az első parancs stdout-ja → második stdin-je</span>
<span class="c">ls -la</span> | <span class="g">grep ".txt"</span> | <span class="y">wc -l</span></pre></div>
<h4>Globbing (fájlnév helyettesítők)</h4>
<div class="cb"><pre><span class="y">*</span>      <span class="d"># 0 vagy több tetszőleges karakter</span>
<span class="y">?</span>      <span class="d"># pontosan 1 tetszőleges karakter</span>
<span class="y">[abc]</span>  <span class="d"># a, b, vagy c közül egy</span>
<span class="y">[a-z]</span>  <span class="d"># kisbetű</span>
<span class="y">[!0-9]</span> <span class="d"># NEM számjegy</span>

<span class="c">ls</span> <span class="y">*.c</span>          <span class="d"># minden .c fájl</span>
<span class="c">rm</span> <span class="y">temp?.txt</span>    <span class="d"># temp1.txt, tempa.txt, stb.</span></pre></div>
<h4>Idézőjelek</h4>
<div class="cb"><pre><span class="y">'szöveg'</span>  <span class="d"># betű szerint – semmi sem értelmez</span>
<span class="y">"szöveg"</span>  <span class="d"># értelmezi: $var, $(cmd), \</span>

name=vilag
echo <span class="g">'Hello $name'</span>  <span class="d"># → Hello $name</span>
echo <span class="g">"Hello $name"</span>  <span class="d"># → Hello vilag</span></pre></div>
<div class="wb"><span class="ii">⚠</span><div class="it"><strong>Globbing ≠ Regex!</strong> A <code>*</code> a shellben = "bármi", regex-ben = "az előző 0 vagy többször".</div></div>`,
exercises:[
{type:"any",typeLabel:"PARANCS",q:"Futtasd az ls parancsot és mentsd a kimenetét a lista.txt fájlba (ha létezik, írja felül)!",
hint:"A > operátor felülírva írja a kimenetet fájlba.",
placeholder:"ls ...",
expected:["ls > lista.txt","ls>lista.txt","ls -la > lista.txt","ls -l > lista.txt"],
okMsg:"Helyes! A > átirányítja az stdout-ot fájlba (felülírva).",
errMsg:"Használj > átirányítást: ls > lista.txt"},
{type:"any",typeLabel:"PARANCS",q:"Futtasd a find / -name passwd parancsot, de a hibaüzeneteket küldd /dev/null-ba!",
hint:"A stderr fájlleíró száma 2. A /dev/null minden beleírt adatot elnyel.",
placeholder:"find / -name passwd ...",
expected:["find / -name passwd 2>/dev/null","find / -name passwd 2> /dev/null"],
okMsg:"Tökéletes! A 2>/dev/null a hibaüzeneteket (stderr, fd 2) elnyeli.",
errMsg:"Szükséges a 2>/dev/null az stderr elnyomásához: find / -name passwd 2>/dev/null"},
{type:"any",typeLabel:"PARANCS",q:"Listázd ki csak a .sh kiterjesztésű fájlokat az aktuális könyvtárban!",
hint:"A * globbing karakter bármennyi karaktert helyettesít.",
placeholder:"ls ...",
expected:["ls *.sh","ls -l *.sh","ls -la *.sh"],
okMsg:"Helyes! A *.sh globbing minta minden .sh-ra végződő fájlnevet megfogja.",
errMsg:"Használj globbing mintát: ls *.sh"},
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"Mit csinál a 2>&1 átirányítás?",
opts:["A stdin-t irányítja a stdout-ra","A stderr-t (2) irányítja ugyanoda, ahová a stdout (1) megy","Megduplázza a kimeneti fájlleírót","Bezárja a stderr-t"],
correct:1,exp:"2>&1: a 2-es (stderr) menjen ugyanoda, ahová az 1-es (stdout) van irányítva. Tipikus: cmd > fajl 2>&1 – minden kimenet fájlba."}
]},

{id:4,title:"Reguláris kifejezések",sub:"^, $, ., *, +, [], {m,n}, csoportosítás, alap vs ERE",
theory:`<h4>Alapszabályok</h4>
<div class="cb"><pre><span class="y">.</span>     <span class="d"># bármely karakter (nem újsor)</span>
<span class="y">^</span>     <span class="d"># sor eleje</span>
<span class="y">$</span>     <span class="d"># sor vége</span>
<span class="y">\\c</span>    <span class="d"># c karakter (pl. \\. = pont)</span>
<span class="g">^$</span>   <span class="d"># üres sor</span>
<span class="g">^ *$</span> <span class="d"># csak szóközöket tartalmazó sor</span></pre></div>
<h4>Kvantorök</h4>
<div class="cb"><pre><span class="y">e*</span>     <span class="d"># 0 vagy többször (alap és ERE)</span>
<span class="y">e+</span>     <span class="d"># 1 vagy többször (csak ERE)</span>
<span class="y">e?</span>     <span class="d"># 0 vagy 1-szer   (csak ERE)</span>
<span class="y">e{m,n}</span><span class="d"># legalább m, legfeljebb n (ERE)</span>
<span class="y">e{3}</span>   <span class="d"># pontosan 3-szor</span></pre></div>
<h4>Karakterosztályok</h4>
<div class="cb"><pre><span class="y">[abc]</span>    <span class="d"># a, b vagy c</span>
<span class="y">[a-z]</span>    <span class="d"># kisbetű</span>
<span class="y">[0-9]</span>    <span class="d"># számjegy</span>
<span class="y">[^0-9]</span>   <span class="d"># NEM számjegy</span>
<span class="y">[:digit:]</span><span class="d"># = [0-9]  (nevesített, [[ ]] belsejében)</span>
<span class="y">[:alpha:]</span><span class="d"># betű</span>
<span class="y">[:alnum:]</span><span class="d"># betű vagy szám</span></pre></div>
<h4>Csoportosítás</h4>
<div class="cb"><pre><span class="d"># Alap regex:</span>
<span class="g">\\(ab\\)*</span>  <span class="d"># "ab" 0 vagy többször</span>
<span class="d"># Kiterjesztett (ERE, grep -E):</span>
<span class="g">(ab)*</span>   <span class="d"># "ab" 0 vagy többször</span>
<span class="g">cat|dog</span> <span class="d"># "cat" vagy "dog"</span>
<span class="d"># Visszahivatkozás \\1:</span>
<span class="g">^(.).*\\1$</span> <span class="d"># ugyanolyan karakterrel kezdődik és végződik</span></pre></div>`,
exercises:[
{type:"any",typeLabel:"PARANCS",q:"Írj grep parancsot, amely egy fajl.txt-ből kilistázza az összes olyan sort, amely számjeggyel kezdődik!",
hint:"A ^ a sor elejére illeszt, a [0-9] számjegyre illeszt.",
placeholder:"grep ...",
expected:["grep '^[0-9]' fajl.txt","grep \"^[0-9]\" fajl.txt","grep -E '^[0-9]' fajl.txt","grep '^[0-9]' fajl.txt","grep '^[[:digit:]]' fajl.txt"],
okMsg:"Helyes! A ^[0-9] minta: ^ = sor eleje, [0-9] = számjegy.",
errMsg:"Szükséges a ^ horgony és [0-9] karakterosztály: grep '^[0-9]' fajl.txt"},
{type:"regex",typeLabel:"REGEX FELADAT",q:"Írj kiterjesztett reguláris kifejezést (ERE), amely pontosan egy 5 jegyű számra illeszt (csak számjegyek, semmi más)!",
hint:"A ^ és $ horgonyok kellenek. A {5} kvantor pontosan 5 előfordulást jelent.",
placeholder:"^...$",
testCases:{match:["12345","00000","99999"],nomatch:["1234","123456","1234a","abcde",""]}},
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"Mit illeszt a ^[^0-9]*$ reguláris kifejezés?",
opts:["Csak számjegyekből álló sort","Üres sort","Olyan sort, amely egyáltalán nem tartalmaz számjegyet","Pontosan egy számjegyet tartalmazó sort"],
correct:2,exp:"^ = sor eleje, [^0-9] = nem számjegy, * = 0 vagy többször, $ = sor vége. Tehát: csak nem-számjegy karakterekből áll (üres sor is illik)."}
]},

{id:5,title:"grep, sed, awk",sub:"Szövegfeldolgozás parancssorból – keresés, csere, mezők",
theory:`<h4>grep – szövegkeresés</h4>
<div class="cb"><pre><span class="c">grep</span> <span class="y">'minta'</span> <span class="g">fajl</span>      <span class="d"># minta előfordulásai</span>
<span class="c">grep</span> <span class="y">-v</span> <span class="g">'minta'</span>      <span class="d"># NEM egyező sorok</span>
<span class="c">grep</span> <span class="y">-n</span> <span class="g">'minta'</span>      <span class="d"># sorszámmal</span>
<span class="c">grep</span> <span class="y">-c</span> <span class="g">'minta'</span>      <span class="d"># csak a találatok száma</span>
<span class="c">grep</span> <span class="y">-i</span> <span class="g">'minta'</span>      <span class="d"># case-insensitive</span>
<span class="c">grep</span> <span class="y">-E</span> <span class="g">'regex'</span>      <span class="d"># kiterjesztett regex (egrep)</span>
<span class="c">grep</span> <span class="y">-r</span> <span class="g">'minta' dir/</span><span class="d"># rekurzív</span></pre></div>
<h4>sed – folyam-szerkesztő</h4>
<div class="cb"><pre><span class="c">sed</span> <span class="y">'s/régi/új/'</span>    <span class="d"># első előfordulás cseréje soronként</span>
<span class="c">sed</span> <span class="y">'s/régi/új/g'</span>   <span class="d"># összes előfordulás (global)</span>
<span class="c">sed</span> <span class="y">'/minta/d'</span>      <span class="d"># minta sorainak törlése</span>
<span class="c">sed</span> <span class="y">-n '3,7p'</span>       <span class="d"># 3-7. sorok kiírása</span>
<span class="c">sed</span> <span class="y">-i 's/foo/bar/g'</span> <span class="g">f</span> <span class="d"># in-place (fájl módosítás!)</span></pre></div>
<h4>awk – mezőfeldolgozás</h4>
<div class="cb"><pre><span class="c">awk</span> <span class="y">'{print $1}'</span>         <span class="d"># első mező</span>
<span class="c">awk</span> <span class="y">'{print $NF}'</span>        <span class="d"># utolsó mező</span>
<span class="c">awk</span> <span class="y">-F: '{print $1}'</span>    <span class="d"># : elválasztóval</span>
<span class="c">awk</span> <span class="y">'/minta/{print $2}'</span> <span class="d"># mintára illeszkedő sorokban 2. mező</span>
<span class="c">awk</span> <span class="y">'{s+=$1} END{print s}'</span> <span class="d"># első mező összege</span></pre></div>`,

{type:"any",typeLabel:"PARANCS",q:"A /etc/passwd fájlból listázd ki az összes olyan sort, amely tartalmazza a 'bash' szöveget!",

{id:6,title:"Shell programozás",sub:"#!/bin/bash, változók, if, for, while, case, test, aritmetika",
theory:`<h4>Script szerkezete</h4>
<div class="cb"><pre><span class="y">#!/bin/bash</span>         <span class="d"># shebang – ez értelmezi a scriptet</span>

nev=<span class="g">"Vilmos"</span>         <span class="d"># nincs szóköz az = körül!</span>
szam=<span class="g">42</span>
echo <span class="g">"Szia, $nev! Szám: ${szam}."</span>

<span class="a">$0</span>  <span class="d"># script neve</span>
<span class="a">$1</span>, <span class="a">$2</span>...  <span class="d"># argumentumok</span>
<span class="a">$#</span>  <span class="d"># argumentumok száma</span>
<span class="a">$?</span>  <span class="d"># utolsó parancs visszatérési értéke</span>
<span class="a">$$</span>  <span class="d"># script PID-je</span></pre></div>
<h4>Feltételes szerkezetek</h4>
<div class="cb"><pre>if [[ <span class="a">$1</span> <span class="y">-gt</span> 10 ]]; then
  echo "nagy"
elif [[ <span class="a">$1</span> <span class="y">-eq</span> 10 ]]; then
  echo "tíz"
else
  echo "kis"
fi

if [[ <span class="y">-f</span> <span class="a">$1</span> ]]; then echo "fájl létezik"; fi
if [[ <span class="y">-z</span> <span class="a">"$var"</span> ]]; then echo "üres string"; fi</pre></div>
<h4>Ciklusok</h4>
<div class="cb"><pre>for gyumolcs in alma korte szilva; do
  echo <span class="g">"$gyumolcs"</span>
done

for ((i=1; i<=10; i++)); do echo <span class="g">$i</span>; done

counter=0
while [[ <span class="a">$counter</span> <span class="y">-lt</span> 5 ]]; do
  echo <span class="g">$counter</span>; <span class="c">((counter++))</span>
done</pre></div>
<h4>Aritmetika és összehasonlítás</h4>
<div class="cb"><pre><span class="c">((</span> x = 5 + 3 <span class="c">))</span>       <span class="d"># x = 8</span>
result=<span class="g">$(( 10 * 4 ))</span>  <span class="d"># result = 40</span>

<span class="y">-eq</span> <span class="d">egyenlő</span>   <span class="y">-ne</span> <span class="d">nem egyenlő</span>
<span class="y">-lt</span> <span class="d">kisebb</span>    <span class="y">-le</span> <span class="d">kisebb vagy egyenlő</span>
<span class="y">-gt</span> <span class="d">nagyobb</span>   <span class="y">-ge</span> <span class="d">nagyobb vagy egyenlő</span></pre></div>`,

{type:"code",typeLabel:"BASH KÓD",lang:"shell",

correct:2,exp:"A [[ ]] bash-beépített feltétel-kiértékelő: kezeli a =~ regex-et, < > string sorrendezést, és nem kell aggódni a szóközös változóknál sem."}
]},

{id:7,title:"Állományrendszer",sub:"inode, jogosultságok, chmod, hard/soft link, rendszerkönyvtárak",
theory:`<h4>Az inode</h4>
<p>Minden fájlnak van egy <strong>inode</strong> bejegyzése – tartalmazza a metaadatokat: méretet, jogosultságokat, tulajdonost, módosítási időt és a lemezblokkok címeit. A fájlnév csak egy könyvtárbejegyzés, amely az inode számra mutat.</p>
<h4>Jogosultságok</h4>
<div class="cb"><pre><span class="d">ls -l kimenete:</span>
<span class="g">-rwxr-xr--</span> 1 user group 1234 jan 1 file.sh
 <span class="a">uuu</span><span class="c">ggg</span><span class="y">ooo</span>  <span class="d">(user / group / others)</span>
<span class="d">r=olvasás(4), w=írás(2), x=végrehajtás(1)</span></pre></div>
<h4>chmod</h4>
<div class="cb"><pre><span class="c">chmod</span> <span class="y">755</span> <span class="g">script.sh</span>  <span class="d"># rwxr-xr-x</span>
<span class="c">chmod</span> <span class="y">644</span> <span class="g">file.txt</span>   <span class="d"># rw-r--r--</span>
<span class="c">chmod</span> <span class="y">u+x</span> <span class="g">file</span>       <span class="d"># user: végrehajtás hozzáadása</span>
<span class="c">chmod</span> <span class="y">go-w</span> <span class="g">file</span>      <span class="d"># group és others: írás elvétele</span></pre></div>
<h4>Hard link vs Symlink</h4>
<div class="cb"><pre><span class="c">ln</span> <span class="g">eredeti.txt link.txt</span>    <span class="d"># hard link – azonos inode</span>
<span class="c">ln</span> <span class="y">-s</span> <span class="g">eredeti.txt link.txt</span> <span class="d"># symlink – mutatóra mutat</span></pre></div>
<div class="ib"><span class="ii">💡</span><div class="it"><strong>Hard link:</strong> törölheted az eredetit, az adat megmarad (linknám > 0). <strong>Symlink:</strong> ha az eredeti törlődik, a symlink érvénytelen lesz.</div></div>
<h4>Fontos könyvtárak</h4>
<div class="cb"><pre><span class="g">/bin</span>   <span class="d"># alapvető programok (ls, cp, bash...)</span>
<span class="g">/etc</span>   <span class="d"># konfigurációs fájlok</span>
<span class="g">/home</span>  <span class="d"># felhasználók home könyvtárai</span>
<span class="g">/tmp</span>   <span class="d"># ideiglenes fájlok</span>
<span class="g">/var</span>   <span class="d"># változó adatok (log-ok, mail)</span>
<span class="g">/proc</span>  <span class="d"># kernel és folyamat info (virtuális!)</span>
<span class="g">/dev</span>   <span class="d"># eszközfájlok (sda, tty, null...)</span>
<span class="g">/usr</span>   <span class="d"># felhasználói programok és lib-ek</span></pre></div>`,

correct:1,exp:"Hard link: az inode link-számlálója növekszik; az adat addig él, amíg van legalább egy hivatkozás. Symlink: csak az elérési utat tárolja."},

{id:8,title:"Folyamatok alapjai",sub:"Program vs folyamat, PID/PPID, állapotok, task_struct, zombie",
theory:`<h4>Program vs Folyamat</h4>
<p>A <strong>program</strong> egy lemezen lévő végrehajtható fájl (statikus). A <strong>folyamat</strong> egy futó program példánya (dinamikus) – saját memóriaterülettel, fájlleírókkal, PID-del.</p>
<h4>task_struct</h4>
<p>A Linux kernel minden folyamatot egy <code>task_struct</code> C struktúrában tart nyilván. Tartalmazza: PID, PPID, állapot, memória leíró, fájlleíró tábla, signal maszk.</p>
<h4>Folyamatállapotok</h4>
<div class="cb"><pre><span class="g">Running (R)</span>  <span class="d"># fut vagy futásra kész</span>
<span class="a">Sleep (S)</span>    <span class="d"># eseményre vár – megszakítható</span>
<span class="a">Sleep (D)</span>    <span class="d"># megszakíthatatlan várakozás (I/O)</span>
<span class="y">Stopped (T)</span> <span class="d"># SIGSTOP / Ctrl+Z</span>
<span class="r">Zombie (Z)</span>  <span class="d"># befejezte, szülő még nem olvasta ki exit kódot</span></pre></div>
<h4>Hasznos parancsok</h4>
<div class="cb"><pre><span class="c">ps</span> <span class="y">aux</span>        <span class="d"># összes folyamat részletesen</span>
<span class="c">ps</span> <span class="y">-ef</span>        <span class="d"># PPID is látható</span>
<span class="c">top</span>           <span class="d"># élő folyamatfigyelő</span>
<span class="c">kill</span> <span class="y">-9</span> <span class="g">PID</span>   <span class="d"># SIGKILL – azonnali leállítás</span>
<span class="c">kill</span> <span class="y">-15</span> <span class="g">PID</span>  <span class="d"># SIGTERM – elegáns leállítás kérése</span>
<span class="c">pgrep</span> <span class="g">bash</span>    <span class="d"># bash nevű folyamatok PID-jei</span></pre></div>`,
exercises:[
{type:"any",typeLabel:"PARANCS",q:"Listázd ki az összes futó folyamatot úgy, hogy a PID és a szülő PID (PPID) is látszódjon!",
hint:"A ps -ef formátum tartalmazza a PPID-et is.",
placeholder:"ps ...",
expected:["ps -ef","ps ef","ps -e -f"],
okMsg:"Helyes! A ps -ef standard Unix formátum: UID, PID, PPID, C, STIME, TTY, TIME, CMD.",
errMsg:"Használj ps -ef parancsot: ez tartalmazza a PPID oszlopot is."},
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"Mi az a zombie folyamat?",
opts:["Végtelen ciklusban futó, 100%-os CPU-t használó folyamat","Befejezett folyamat, amelynek exit kódját a szülő még nem olvasta ki (wait())","Leállított folyamat (Ctrl+Z után)","Kernel folyamat, amely memória-szivárgást okoz"],
correct:1,exp:"Zombie (Z állapot): már befejezett folyamat, de bejegyzése megmarad a folyamattáblában, mert a szülő még nem hívta a wait()-et. Nem fut, nem fogyaszt CPU-t."}
]},

{id:9,title:"Folyamatkezelés C-ben",sub:"fork(), getpid(), exit(), wait(), waitpid()",
theory:`<h4>fork() – folyamat klónozása</h4>
<div class="cb"><pre><span class="y">#include &lt;unistd.h&gt;</span>
<span class="y">#include &lt;sys/wait.h&gt;</span>
<span class="y">#include &lt;stdio.h&gt;</span>

<span class="c">pid_t</span> pid = <span class="g">fork()</span>;

if (pid <span class="r">&lt;</span> 0) {
    <span class="a">perror</span>("fork hiba"); return 1;
} else if (pid <span class="r">==</span> 0) {
    <span class="d">/* GYEREK – fork() → 0 */</span>
    printf("Gyerek PID: %d\n", <span class="a">getpid()</span>);
    <span class="a">exit(0)</span>;
} else {
    <span class="d">/* SZÜLŐ – fork() → gyerek PID-je */</span>
    printf("Szülő: %d, gyerek: %d\n", <span class="a">getpid()</span>, pid);
    <span class="a">wait(NULL)</span>; <span class="d">// zombie elkerülése!</span>
}</pre></div>
<div class="ib"><span class="ii">💡</span><div class="it"><strong>fork() visszatérési értéke:</strong> szülőben = gyerek PID-je (&gt;0), gyerekben = 0, hiba esetén = -1.</div></div>
<h4>exit() vs _exit()</h4>
<div class="cb"><pre><span class="c">exit(0)</span>   <span class="d"># stdio buffereket kiüríti, atexit() hív</span>
<span class="c">_exit(0)</span>  <span class="d"># azonnal vissza a kernelbe – fork() utáni gyerekben ajánlott</span></pre></div>
<h4>waitpid()</h4>
<div class="cb"><pre><span class="c">pid_t</span> ret = <span class="g">waitpid(pid, &status, 0)</span>; <span class="d"># adott gyerekre vár</span>
if (<span class="a">WIFEXITED(status)</span>)
    printf("exit kód: %d\n", <span class="a">WEXITSTATUS(status)</span>);</pre></div>`,
exercises:[
{type:"code",typeLabel:"C KÓD",lang:"text/x-csrc",
q:"Írj C programot, amely fork()-kal létrehoz egy gyerekfolyamatot! A gyerek írja ki a saját PID-jét, a szülő várja meg a gyereket (wait), majd írja ki: 'Gyerek befejezte'!",
hint:"fork() visszatérése: gyerekben 0, szülőben a gyerek PID-je. wait(NULL) megvárja bármelyik gyereket.",
placeholder:"#include <stdio.h>\n#include <unistd.h>\n#include <sys/wait.h>\n\nint main() {\n    \n}",
patterns:[
  [/fork\s*\(\s*\)/],
  [/pid\s*==\s*0|pid\s*<\s*1/],
  [/getpid\s*\(\s*\)/],
  [/wait\s*\(\s*(NULL|&|\w)/]
],
hints:["Hiányzik a fork() hívás","Hiányzik a pid==0 feltétel (gyerek ág)","Hiányzik a getpid() a PID kiírásához","Hiányzik a wait() a szülő ágban"],
okMsg:"Tökéletes! fork()+wait() kombinációja megakadályozza a zombie folyamatot."},
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"Mi a fork() visszatérési értéke a gyerekfolyamatban?",
opts:["A szülő PID-je","A gyerek saját PID-je","0","-1"],
correct:2,exp:"fork() visszatér: szülőben = gyerek PID-je (>0), gyerekben = 0, hiba esetén -1. Ezért: if (pid == 0) { /* gyerek */ } else { /* szülő */ }"}
]},

{id:10,title:"Pipe C-ben",sub:"pipe(), read(), write(), close() – szülő-gyerek kommunikáció",
theory:`<h4>A pipe felépítése</h4>
<div class="cb"><pre><span class="d">// pfd[0] = olvasóvég    pfd[1] = írásovég</span>
<span class="a">SZÜLŐ ír → pfd[1]</span> ────→ <span class="g">pfd[0] → olvas GYEREK</span>

<span class="c">int</span> pfd[2];
<span class="g">pipe(pfd)</span>;  <span class="d">// létrehozza a két fájlleírót</span></pre></div>
<h4>Szülő → Gyerek kommunikáció</h4>
<div class="cb"><pre><span class="c">int</span> pfd[2];
pipe(pfd);
<span class="c">pid_t</span> pid = fork();
if (pid == 0) {
    <span class="d">/* GYEREK: olvas */</span>
    <span class="a">close(pfd[1])</span>;  <span class="d">// írásóvéget lezárja!</span>
    <span class="c">char</span> buf[100];
    <span class="c">int</span> n = <span class="g">read(pfd[0], buf, sizeof(buf))</span>;
    buf[n] = '\0';
    printf("Kaptam: %s\n", buf);
    <span class="a">close(pfd[0])</span>;
    _exit(0);
} else {
    <span class="d">/* SZÜLŐ: ír */</span>
    <span class="a">close(pfd[0])</span>;  <span class="d">// olvasóvéget lezárja!</span>
    <span class="g">write(pfd[1], "Hello!", 6)</span>;
    <span class="a">close(pfd[1])</span>;  <span class="d">// EOF jel a gyereknek</span>
    wait(NULL);
}</pre></div>
<div class="wb"><span class="ii">⚠</span><div class="it"><strong>Kritikus:</strong> mindig zárd le a pipe véget, amelyiket nem használod! Ha az írásóvéget nyitva hagyod, az olvasó soha nem kap EOF-t.</div></div>`,
exercises:[
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"A pipe(pfd) hívás után melyik fájlleíróba kell írni és melyikből olvasni?",
opts:["pfd[0]-ba írunk, pfd[1]-ből olvasunk","pfd[1]-be írunk, pfd[0]-ból olvasunk","Mindkettőbe lehet írni és mindkettőből olvasni","A pipe() automatikusan stdin/stdout-ot állít be"],
correct:1,exp:"Konvenció: pfd[1] = write end (írásovég), pfd[0] = read end (olvasóvég). Adatfolyam: pfd[1] → pipe puffer → pfd[0]."},
{type:"code",typeLabel:"C KÓD",lang:"text/x-csrc",
q:"Egészítsd ki a kódot: a szülő küldjön egy egész számot a gyereknek pipe-on, a gyerek írja ki a kétszeresét!\n\n(Tipp: write(pfd[1], &szam, sizeof(int)) és read(pfd[0], &kapott, sizeof(int)))",
hint:"Szülő: close(pfd[0]), write pfd[1]-be, close(pfd[1]), wait. Gyerek: close(pfd[1]), read pfd[0]-ból, kiírja kétszeresét.",
placeholder:"#include <stdio.h>\n#include <unistd.h>\n#include <sys/wait.h>\n\nint main() {\n    int pfd[2];\n    pipe(pfd);\n    int szam = 21;\n    pid_t pid = fork();\n    if (pid == 0) {\n        // gyerek\n        \n    } else {\n        // szülő\n        \n    }\n    return 0;\n}",
patterns:[
  [/close\s*\(\s*pfd\s*\[\s*1\s*\]\s*\)/],
  [/read\s*\(\s*pfd\s*\[\s*0\s*\]/],
  [/close\s*\(\s*pfd\s*\[\s*0\s*\]\s*\)/],
  [/write\s*\(\s*pfd\s*\[\s*1\s*\]/],
  [/\*\s*2|<<\s*1|2\s*\*/]
],
hints:["A gyereknek le kell zárnia a pfd[1]-et (close(pfd[1]))","A gyereknek olvasnia kell a pfd[0]-ból (read(pfd[0], ...)","A szülőnek le kell zárnia a pfd[0]-t (close(pfd[0]))","A szülőnek írnia kell a pfd[1]-be (write(pfd[1], &szam, sizeof(int)))","A gyereknek a kétszeresét kell kiírnia (*2)"],
okMsg:"Tökéletes! close() az nem használt végeken + write/read + kétszeres számítás mind megvan."}
]},

{id:11,title:"exec függvénycsalád",sub:"execl, execv, execlp, execvp – másik program indítása",
theory:`<h4>Mi az exec?</h4>
<p>Az <code>exec</code> lecseréli az aktuális folyamat programját egy másikra. <strong>Nem hoz létre új folyamatot</strong> – ugyanaz a PID, de a memória felülíródik az új programmal.</p>
<h4>A névcsoport logikája</h4>
<div class="cb"><pre><span class="d">// l = list (NULL-lal zárt argumentumlista)</span>
<span class="d">// v = vector (char* tömb)</span>
<span class="d">// p = PATH-ban keresi a programot</span>
<span class="d">// e = environment (saját env)</span>

<span class="c">execl</span> (<span class="g">"/bin/ls"</span>, <span class="g">"ls"</span>, <span class="g">"-la"</span>, <span class="r">NULL</span>);
<span class="c">execlp</span>(<span class="g">"ls"</span>,      <span class="g">"ls"</span>, <span class="g">"-la"</span>, <span class="r">NULL</span>);

<span class="c">char</span> *args[] = { <span class="g">"ls"</span>, <span class="g">"-la"</span>, <span class="r">NULL</span> };
<span class="c">execv</span> (<span class="g">"/bin/ls"</span>, args);
<span class="c">execvp</span>(<span class="g">"ls"</span>,      args);</pre></div>
<div class="wb"><span class="ii">⚠</span><div class="it"><strong>exec CSAK hiba esetén tér vissza!</strong> Ha sikerült, az aktuális kód folytatása soha nem hajtódik végre.</div></div>
<h4>fork + exec – tipikus minta</h4>
<div class="cb"><pre><span class="c">pid_t</span> pid = <span class="g">fork()</span>;
if (pid == 0) {
    <span class="c">execlp</span>(<span class="g">"ls"</span>, <span class="g">"ls"</span>, <span class="g">"-la"</span>, <span class="r">NULL</span>);
    <span class="a">perror</span>("exec hiba"); <span class="d">// csak hiba esetén jut ide</span>
    _exit(1);
} else {
    <span class="g">wait(NULL)</span>;
}</pre></div>`,
exercises:[
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"Mi a különbség az execl és az execlp között?",
opts:["Az execl gyorsabb","Az execl teljes elérési utat vár (/bin/ls), az execlp a PATH-ban is keresi a programot","Az execlp tömböt vár, az execl listát","Az execlp új folyamatot hoz létre"],
correct:1,exp:"A 'p' suffix = PATH keresés. execlp('ls',...) megkeresi a PATH-ban. execl('/bin/ls',...) csak az abszolút utat fogadja."},
{type:"code",typeLabel:"C KÓD",lang:"text/x-csrc",
q:"Írj C programot, amely fork() után a gyerekfolyamatban futtatja a 'date' parancsot execlp-vel! A szülő várja meg a gyereket.",
hint:"execlp('date', 'date', NULL) – az első arg a program neve, a többi az argv[], mindig NULL-lal zárul.",
placeholder:"#include <stdio.h>\n#include <unistd.h>\n#include <sys/wait.h>\n\nint main() {\n    \n}",
patterns:[
  [/fork\s*\(\s*\)/],
  [/pid\s*==\s*0/],
  [/execlp\s*\(\s*["']date["']|execvp\s*\(\s*["']date["']/],
  [/wait\s*\(\s*(NULL|&|\w)/]
],
hints:["Hiányzik a fork() hívás","Hiányzik a pid==0 feltétel (gyerek ág)","Hiányzik az execlp('date','date',NULL) vagy execvp hívás","Hiányzik a wait(NULL) a szülő ágban"],
okMsg:"Tökéletes! fork()+execlp()+wait() a klasszikus külső program futtatási minta."}
]},

{id:12,title:"Folyamatok közti kommunikáció",sub:"Signals, pipe, FIFO, popen/pclose, IPC áttekintés",
theory:`<h4>IPC módszerek</h4>
<div class="cb"><pre><span class="g">Signals</span>        <span class="d">→ kevés info, figyelmeztetés</span>
<span class="g">Fájlok</span>         <span class="d">→ egyszerű, de lassú + szinkronizálási probléma</span>
<span class="g">Pipe (névtelen)</span><span class="d">→ szülő-gyerek között, egyirányú, FIFO</span>
<span class="g">FIFO (named)</span>  <span class="d">→ bármely folyamat, névvel azonosítható</span>
<span class="g">Szemafor</span>       <span class="d">→ szinkronizáció, kölcsönös kizárás</span>
<span class="g">Message queue</span>  <span class="d">→ üzenetcsomók, típus szerint szűrhető</span>
<span class="g">Shared memory</span>  <span class="d">→ leggyorsabb: közös memóriaterület</span>
<span class="g">Socket</span>         <span class="d">→ hálózaton át is (TCP/UDP/UNIX)</span></pre></div>
<h4>popen / pclose</h4>
<div class="cb"><pre><span class="y">#include &lt;stdio.h&gt;</span>

<span class="d">// Külső parancs kimenetét olvassuk:</span>
<span class="c">FILE</span> *fp = <span class="g">popen("ls -la", "r")</span>;
<span class="c">char</span> buf[256];
while (<span class="a">fgets(buf, sizeof(buf), fp)</span>)
    printf("%s", buf);
<span class="g">pclose(fp)</span>;  <span class="d">// lezár + wait()</span>

<span class="d">// Külső parancs bemenetét írjuk:</span>
<span class="c">FILE</span> *fp2 = <span class="g">popen("wc -l", "w")</span>;
fprintf(fp2, "sor1\nsor2\n");
<span class="g">pclose(fp2)</span>;</pre></div>
<div class="ib"><span class="ii">💡</span><div class="it"><strong>popen háttere:</strong> automatikusan elvégzi a pipe()+fork()+exec() kombinációt. Egyszerűbb mint a nyers pipe() kezelés.</div></div>`,
exercises:[
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"Mikor érdemes popen()-t használni pipe() helyett?",
opts:["Soha – elavult","Ha shell parancs kimenetét akarjuk olvasni FILE* streamen, anélkül hogy kézzel kezelnénk pipe+fork+exec-et","Csak ha a pipe() nem sikerült","Ha két gyerekfolyamat között kell kommunikálni"],
correct:1,exp:"A popen() kényelmes absztrakció: automatikusan elvégzi a pipe()+fork()+exec() kombinációt. Hátránya: csak egyirányú."},
{type:"code",typeLabel:"C KÓD",lang:"text/x-csrc",
q:"Írj C kódrészletet, amely popen()-nel lefuttatja a 'date' parancsot, beolvassa a kimenetét és kiírja a stdout-ra!",
hint:"popen('date', 'r') visszaad egy FILE*-t. fgets(buf, sizeof(buf), fp) soronként olvas. pclose(fp) a végén.",
placeholder:"#include <stdio.h>\n\nint main() {\n    char buf[256];\n    \n    return 0;\n}",
patterns:[
  [/popen\s*\(\s*["']date["']/],
  [/fgets\s*\(|fread\s*\(|fscanf\s*\(/],
  [/printf\s*\(|puts\s*\(|fputs\s*\(/],
  [/pclose\s*\(/]
],
hints:["Hiányzik a popen('date','r') hívás","Hiányzik a beolvasás (fgets vagy hasonló)","Hiányzik a kiírás (printf/puts)","Hiányzik a pclose() a végén"],
okMsg:"Tökéletes! popen() → fgets() loop → pclose() a klasszikus minta."}
]},

{id:13,title:"FIFO / Named Pipe",sub:"mkfifo, open, read, write, close, unlink – bármely folyamat között",
theory:`<h4>Mi a FIFO?</h4>
<p>Névvel ellátott pipe – megőrzi a pipe tulajdonságait, de szimbolikus névvel rendelkezik, így bármely két folyamat (nem csak szülő-gyerek) kommunikálhat rajta.</p>
<div class="cb"><pre><span class="d">ls -l /tmp/myfifo:</span>
<span class="g">prw-r--r--</span> 1 user group 0 jan 1 myfifo
<span class="a">^</span>
<span class="a">p</span> = pipe (FIFO fájltípus)</pre></div>
<h4>Létrehozás és használat</h4>
<div class="cb"><pre><span class="y">#include &lt;sys/stat.h&gt;</span>
<span class="y">#include &lt;fcntl.h&gt;</span>
<span class="y">#include &lt;unistd.h&gt;</span>

<span class="g">mkfifo("/tmp/myfifo", 0666)</span>;

<span class="d">// ÍRÁS (producer):</span>
<span class="c">int</span> fd = <span class="g">open("/tmp/myfifo", O_WRONLY)</span>;
<span class="g">write(fd, "adat", 4)</span>;
<span class="g">close(fd)</span>;

<span class="d">// OLVASÁS (consumer):</span>
<span class="c">int</span> fd = <span class="g">open("/tmp/myfifo", O_RDONLY)</span>;
<span class="c">char</span> buf[100];
<span class="g">read(fd, buf, sizeof(buf))</span>;
<span class="g">close(fd)</span>;

<span class="d">// Törlés:</span>
<span class="g">unlink("/tmp/myfifo")</span>;</pre></div>
<h4>O_NONBLOCK</h4>
<div class="cb"><pre><span class="d">// Alapértelmezett: open() blokkolódik amíg másik vég nincs</span>
<span class="d">// O_NONBLOCK esetén:</span>
open("/tmp/f", <span class="y">O_RDONLY | O_NONBLOCK</span>); <span class="d">// azonnal</span>
open("/tmp/f", <span class="y">O_WRONLY | O_NONBLOCK</span>); <span class="d">// -1 ha nincs olvasó</span></pre></div>`,
exercises:[
{type:"any",typeLabel:"PARANCS",q:"Hozz létre egy FIFO fájlt /tmp/sajatfifo névvel parancssorból!",
hint:"A mkfifo parancs létrehozza a named pipe-ot.",
placeholder:"mkfifo ...",
expected:["mkfifo /tmp/sajatfifo"],
okMsg:"Helyes! A mkfifo FIFO speciális fájlt hoz létre (fájltípusa: p).",
errMsg:"Helyes szintaxis: mkfifo /tmp/sajatfifo"},
{type:"multi",typeLabel:"FELELETVÁLASZTÓS",q:"Mi történik, ha O_NONBLOCK nélkül nyitjuk meg írásra a FIFO-t, de még nincs olvasója?",
opts:["Hibaüzenetet ad vissza azonnal (-1)","Létrehozza a fájlt és folytatja a futást","Blokkolódik (vár), amíg egy másik folyamat meg nem nyitja olvasásra","SIGPIPE jelet küld"],
correct:2,exp:"FIFO open() alapértelmezetten blokkolódik: az írásra nyitás vár amíg van olvasója. Ez szinkronizációs pontot jelent. O_NONBLOCK-kal -1-et ad vissza ENXIO hibával."},
{type:"code",typeLabel:"C KÓD",lang:"text/x-csrc",

hint:"mkfifo() → open(O_WRONLY) → write() → close() → unlink(). A strlen+1 vagy fix méret a write-hoz.",

patterns:[
  [/mkfifo\s*\(\s*["']\/tmp\/testfifo["']/],
  [/open\s*\(.*O_WRONLY/],
  [/write\s*\(.*[Hh]ello/],
  [/close\s*\(/],
  [/unlink\s*\(\s*["']\/tmp\/testfifo["']/]
],
hints:["Hiányzik a mkfifo('/tmp/testfifo', 0666) hívás","Hiányzik az open(..., O_WRONLY) hívás","Hiányzik a write() a 'Hello FIFO' szöveggel","Hiányzik a close(fd) hívás","Hiányzik az unlink('/tmp/testfifo') törlés"],
okMsg:"Tökéletes! mkfifo → open(O_WRONLY) → write → close → unlink – ez a teljes írói oldal."}

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let cur=0;
const prog=JSON.parse(localStorage.getItem('lx_prog')||'{}');
const eds={};

// ══════════════════════════════════════════════════
//  BUILD NAV
// ══════════════════════════════════════════════════
function buildNav(){
  const nav=document.getElementById('nav');
  T.forEach((t,i)=>{
    const p=prog[i]||{};
    const tot=t.exercises.length;
    const sol=Object.values(p).filter(x=>x).length;
    let cc='',ci='';
    if(sol===tot&&tot>0){cc='done';ci='✓';}
    else if(sol>0){cc='part';ci=sol;}
    const b=document.createElement('button');
    b.className='ni'+(i===0?' active':'');
    b.dataset.i=i;
    b.innerHTML=`<span class="ni-num">${String(i+1).padStart(2,'0')}</span><span class="ni-lbl">${t.title}</span><span class="ni-chk ${cc}">${ci}</span>`;
    b.onclick=()=>go(i);
    nav.appendChild(b);
  });
}

// ══════════════════════════════════════════════════
//  BUILD PAGES
// ══════════════════════════════════════════════════
function buildPages(){
  const main=document.getElementById('main');
  T.forEach((t,ti)=>{
    const p=prog[ti]||{};
    const sol=Object.values(p).filter(x=>x).length;
    const div=document.createElement('div');
    div.className='page'+(ti===0?' active':'');
    div.id='pg'+ti;
    div.innerHTML=`
<div class="ph">
  <div class="p-num">FEJEZET ${String(ti+1).padStart(2,'0')} / ${T.length}</div>
  <h1 class="p-title">${t.title}</h1>
  <p class="p-sub">${t.sub}</p>
</div>
<div class="th-sec">
  <button class="th-tog${ti===0?' open':''}" onclick="togTh(this)">
    <div class="th-icon">📖</div>
    <span class="th-lbl">Elméleti áttekintés</span>
    <span class="th-arr">▾</span>
  </button>
  <div class="th-body${ti===0?' open':''}">${t.theory}</div>
</div>
<div class="ex-hd"><h3>Feladatok</h3><span class="ex-cnt" id="ec${ti}">${sol}/${t.exercises.length} megoldva</span></div>
<div id="el${ti}">${t.exercises.map((e,ei)=>buildEx(e,ti,ei)).join('')}</div>
<div class="pg-nav">
  <button class="btn-nav" onclick="go(${ti-1})" ${ti===0?'disabled':''}>← Előző</button>
  <button class="btn-nav" onclick="go(${ti+1})" ${ti===T.length-1?'disabled':''}>Következő →</button>
</div>`;
    main.appendChild(div);
  });
}

function buildEx(e,ti,ei){
  const sol=!!(prog[ti]||{})[ei];
  const tc={'exact':'tc','any':'tc','code':'to','regex':'ty','multi':'ta'}[e.type]||'';
  let inp='';
  if(e.type==='multi'){
    inp=`<div class="mc-opts" id="mc${ti}_${ei}">${e.opts.map((o,oi)=>`
<button class="mc-opt${sol&&oi===e.correct?' ok':''}" onclick="chkMC(${ti},${ei},${oi})" ${sol?'disabled':''} data-i="${oi}">
  <span class="mc-k">${String.fromCharCode(65+oi)}</span>${o}
</button>`).join('')}</div>`;
  } else {
    const ml=e.type==='code';
    inp=`<div class="ex-hint">${e.hint?'💡 '+e.hint.replace(/`([^`]+)`/g,'<code>$1</code>'):''}</div>
<textarea id="ta${ti}_${ei}" class="${ml?'ml':'sl'}">${e.placeholder||''}</textarea>
<div class="ex-act">
  <button class="btn-c" id="cb${ti}_${ei}" onclick="chkEx(${ti},${ei})" ${sol?'disabled':''}>
    ${sol?'✓ Megoldva':'⚡ Ellenőrzés'}
  </button>
  ${!sol?`<button class="btn-h" onclick="showHint(${ti},${ei})">Tipp</button>`:''}
  <button class="btn-r" onclick="resetEx(${ti},${ei})">↺ Visszaállítás</button>
</div>`;
  }
  return `<div class="ex${sol?' solved':''}" id="ex${ti}_${ei}">
<div class="ex-h">
  <div class="ex-badge ${sol?'s':'p'}" id="bd${ti}_${ei}">${sol?'✓':(ei+1)}</div>
  <div class="ex-meta">
    <div class="ex-type ${tc}">${e.typeLabel}</div>
    <div class="ex-q">${e.q.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>')}</div>
  </div>
</div>
<div class="ex-b">${inp}<div class="fb" id="fb${ti}_${ei}"></div></div>
</div>`;
}

// ══════════════════════════════════════════════════
//  CODEMIRROR
// ══════════════════════════════════════════════════
function initEds(){
  T.forEach((t,ti)=>{
    t.exercises.forEach((e,ei)=>{
      if(e.type==='multi') return;
      const ta=document.getElementById(`ta${ti}_${ei}`);
      if(!ta) return;
      const sl=e.type!=='code';
      const cm=CodeMirror.fromTextArea(ta,{
        mode:e.lang||'shell',theme:'dracula',
        lineNumbers:!sl,lineWrapping:true,autofocus:false,
        extraKeys:{Enter:sl?()=>chkEx(ti,ei):CodeMirror.Pass}
      });
      if(sl) cm.setSize(null,42); else cm.setSize(null,145);
      eds[`${ti}_${ei}`]=cm;
    });
  });
}

// ══════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════
function go(i){
  if(i<0||i>=T.length) return;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg'+i).classList.add('active');
  document.querySelector(`.ni[data-i="${i}"]`).classList.add('active');
  cur=i; window.scrollTo(0,0);
  if(window.innerWidth<=768) document.getElementById('sb').classList.remove('open');
}

function togTh(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

// ══════════════════════════════════════════════════
//  CHECKING
// ══════════════════════════════════════════════════
function getVal(ti,ei){
  const k=`${ti}_${ei}`;
  return eds[k]?eds[k].getValue().trim():(document.getElementById(`ta${ti}_${ei}`)||{value:''}).value.trim();
}

function norm(s){ return s.replace(/\s+/g,' ').trim(); }

function chkMC(ti,ei,chosen){
  const e=T[ti].exercises[ei];
  const ok=chosen===e.correct;
  document.querySelectorAll(`#mc${ti}_${ei} .mc-opt`).forEach((o,i)=>{
    o.disabled=true;
    if(i===e.correct) o.classList.add('ok');
    else if(i===chosen&&!ok) o.classList.add('ng');
  });
  fb(ti,ei,ok,(ok?'✓ Helyes! ':'✗ Nem ez. ')+e.exp);
  if(ok) mark(ti,ei);
}

function chkEx(ti,ei){
  const e=T[ti].exercises[ei];
  const val=getVal(ti,ei);
  if(!val){fb(ti,ei,false,'✗ Adj meg egy választ!');return;}
  const btn=document.getElementById(`cb${ti}_${ei}`);
  btn.disabled=true;

  if(e.type==='exact'||e.type==='any'){
    const ok=e.expected.some(x=>norm(val)===norm(x));
    fb(ti,ei,ok,ok?'✓ '+e.okMsg:'✗ '+e.errMsg);
    if(ok) mark(ti,ei); else btn.disabled=false;
  } else if(e.type==='regex'){
    chkRegex(ti,ei,val);
  } else if(e.type==='code'){
    chkCode(ti,ei,val,e);
  }
}

function chkRegex(ti,ei,pat){
  const e=T[ti].exercises[ei];
  try{
    const stripped=pat.replace(/^\^/,'').replace(/\$$/,'');
    const re=new RegExp('^'+stripped+'$');
    const allM=e.testCases.match.every(s=>re.test(s));
    const noneM=e.testCases.nomatch.every(s=>!re.test(s));
    const ok=allM&&noneM;
    if(ok){
      fb(ti,ei,true,`✓ Helyes regex! Illeszkedett: ${e.testCases.match.map(s=>`<code>${s}</code>`).join(', ')}`);
      mark(ti,ei);
    } else {
      const fM=e.testCases.match.filter(s=>!re.test(s));
      const fN=e.testCases.nomatch.filter(s=>re.test(s));
      let msg='✗ Nem teljesen helyes. ';
      if(fM.length) msg+=`Nem illeszkedett (kellene): ${fM.map(s=>`<code>${s}</code>`).join(', ')}. `;
      if(fN.length) msg+=`Illeszkedett (nem kellett): ${fN.map(s=>`<code>${s}</code>`).join(', ')}.`;
      fb(ti,ei,false,msg);
      document.getElementById(`cb${ti}_${ei}`).disabled=false;
    }
  }catch(err){
    fb(ti,ei,false,'✗ Érvénytelen regex: '+err.message);
    document.getElementById(`cb${ti}_${ei}`).disabled=false;
  }
}

function chkCode(ti,ei,val,e){
  const btn=document.getElementById(`cb${ti}_${ei}`);
  const missing=[];
  const ok=e.patterns.every((group,gi)=>{
    const hit=group.some(re=>re.test(val));
    if(!hit) missing.push(e.hints[gi]||`Hiányzik a ${gi+1}. elem`);
    return hit;
  });
  if(ok){
    fb(ti,ei,true,'✓ '+e.okMsg);
    mark(ti,ei);
  } else {
    fb(ti,ei,false,'✗ Még nem teljesen jó:<br>• '+missing.join('<br>• '));
    btn.disabled=false;
  }
}

function showHint(ti,ei){
  const e=T[ti].exercises[ei];
  const el=document.getElementById(`fb${ti}_${ei}`);
  el.className='fb show hint';
  el.innerHTML='💡 '+(e.hint||'Nézd meg az elméleti részt!').replace(/`([^`]+)`/g,'<code>$1</code>');
}

function fb(ti,ei,ok,msg){
  const el=document.getElementById(`fb${ti}_${ei}`);
  el.className='fb show '+(ok?'ok':'err');
  el.innerHTML=msg;
}

function mark(ti,ei){
  if(!prog[ti]) prog[ti]={};
  prog[ti][ei]=true;
  localStorage.setItem('lx_prog',JSON.stringify(prog));
  const bd=document.getElementById(`bd${ti}_${ei}`);
  if(bd){bd.className='ex-badge s';bd.textContent='✓';}
  const ex=document.getElementById(`ex${ti}_${ei}`);
  if(ex) ex.classList.add('solved');
  const btn=document.getElementById(`cb${ti}_${ei}`);
  if(btn){btn.disabled=true;btn.innerHTML='✓ Megoldva';}
  updProg(); updNav(ti);
}

function resetEx(ti,ei){
  if(prog[ti]) delete prog[ti][ei];
  localStorage.setItem('lx_prog',JSON.stringify(prog));
  const bd=document.getElementById(`bd${ti}_${ei}`);
  if(bd){bd.className='ex-badge p';bd.textContent=ei+1;}
  const ex=document.getElementById(`ex${ti}_${ei}`);
  if(ex) ex.classList.remove('solved');
  const btn=document.getElementById(`cb${ti}_${ei}`);
  if(btn){btn.disabled=false;btn.innerHTML='⚡ Ellenőrzés';}
  const fbEl=document.getElementById(`fb${ti}_${ei}`);
  if(fbEl) fbEl.className='fb';
  const k=`${ti}_${ei}`;
  if(eds[k]) eds[k].setValue(T[ti].exercises[ei].placeholder||'');
  const mc=document.getElementById(`mc${ti}_${ei}`);
  if(mc) mc.querySelectorAll('.mc-opt').forEach(o=>{o.disabled=false;o.classList.remove('ok','ng');});
  updProg(); updNav(ti);
}

function updProg(){
  let tot=0,sol=0;
  T.forEach((t,ti)=>{
    tot+=t.exercises.length;
    sol+=Object.values(prog[ti]||{}).filter(x=>x).length;
  });
  const pct=tot?Math.round(sol/tot*100):0;
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('ptxt').textContent=`${pct}% kész · ${sol}/${tot} feladat`;
}

function updNav(ti){
  const t=T[ti];
  const p=prog[ti]||{};
  const tot=t.exercises.length;
  const sol=Object.values(p).filter(x=>x).length;
  const nc=document.querySelector(`.ni[data-i="${ti}"] .ni-chk`);
  if(!nc) return;
  if(sol===tot&&tot>0){nc.className='ni-chk done';nc.textContent='✓';}
  else if(sol>0){nc.className='ni-chk part';nc.textContent=sol;}
  else{nc.className='ni-chk';nc.textContent='';}
  const ec=document.getElementById('ec'+ti);
  if(ec) ec.textContent=`${sol}/${tot} megoldva`;
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
buildNav();
buildPages();
setTimeout(initEds,50);
updProg();
</script>
</body>
</html>
