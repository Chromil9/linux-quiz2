<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux & OS alapok – Interaktív tananyag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1d27;
  --bg4: #22263a;
  --border: #2a2e42;
  --border2: #363b55;
  --text: #e4e6f0;
  --text2: #8b90a8;
  --text3: #5a5f78;
  --accent: #7c6af7;
  --accent2: #9d8ff9;
  --green: #3dd68c;
  --green2: #2aaf72;
  --red: #f55f6d;
  --yellow: #f5c842;
  --cyan: #38d9f5;
  --orange: #f5874a;
  --font-mono: 'JetBrains Mono', monospace;
  --font-head: 'Syne', sans-serif;
  --sidebar-w: 280px;
  --radius: 8px;
  --radius-lg: 14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  font-size: 14px;
  line-height: 1.65;
  overflow-x: hidden;
}

/* ── SIDEBAR ─────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  height: 100vh;
  position: fixed;
  top: 0; left: 0;
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow: hidden;
}

.sb-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sb-logo {
  font-family: var(--font-head);
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sb-logo .logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; font-weight: 700;
  flex-shrink: 0;
}

.sb-progress {
  margin-top: 12px;
}

.sb-progress-bar {
  height: 3px;
  background: var(--bg4);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 6px;
}

.sb-progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

.sb-progress-text {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
}

.sb-nav {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.sb-nav::-webkit-scrollbar { width: 4px; }
.sb-nav::-webkit-scrollbar-track { background: transparent; }
.sb-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  position: relative;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: var(--bg3); }

.nav-item.active {
  background: var(--bg4);
  color: var(--accent2);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.nav-num {
  font-size: 10px;
  color: var(--text3);
  width: 18px;
  flex-shrink: 0;
  font-family: var(--font-mono);
}

.nav-item.active .nav-num { color: var(--accent); }

.nav-label {
  font-size: 12px;
  color: var(--text2);
  flex: 1;
  font-family: var(--font-mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-item.active .nav-label { color: var(--accent2); }

.nav-check {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  flex-shrink: 0;
  transition: all 0.3s;
}

.nav-check.done {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

.nav-check.partial {
  border-color: var(--yellow);
  background: rgba(245,200,66,0.15);
  color: var(--yellow);
  font-size: 10px;
}

/* ── MAIN CONTENT ─────────────────────────────────── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
}

.topic-page {
  display: none;
  max-width: 860px;
  margin: 0 auto;
  padding: 48px 40px 80px;
  animation: fadein 0.25s ease;
}

.topic-page.active { display: block; }

@keyframes fadein {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.topic-header {
  margin-bottom: 32px;
}

.topic-num {
  font-size: 11px;
  color: var(--accent);
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.topic-title {
  font-family: var(--font-head);
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.03em;
}

.topic-subtitle {
  margin-top: 8px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  max-width: 600px;
}

/* ── THEORY SECTION ───────────────────────────────── */
.theory-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 28px;
  overflow: hidden;
}

.theory-toggle {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  user-select: none;
  background: none;
  border: none;
  width: 100%;
  color: var(--text);
  transition: background 0.15s;
}

.theory-toggle:hover { background: var(--bg3); }

.theory-icon {
  width: 28px; height: 28px;
  background: rgba(124, 106, 247, 0.15);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.theory-toggle-label {
  flex: 1;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 600;
  text-align: left;
}

.theory-arrow {
  font-size: 12px;
  color: var(--text3);
  transition: transform 0.25s;
}

.theory-toggle.open .theory-arrow { transform: rotate(180deg); }

.theory-body {
  padding: 0 20px 20px;
  border-top: 1px solid var(--border);
  display: none;
}

.theory-body.open { display: block; }

.theory-body h4 {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent2);
  margin: 18px 0 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.theory-body p {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.75;
  margin-bottom: 10px;
}

.theory-body ul {
  margin: 0 0 12px 4px;
  list-style: none;
}

.theory-body ul li {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.75;
  padding-left: 14px;
  position: relative;
}

.theory-body ul li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-size: 11px;
}

code {
  font-family: var(--font-mono);
  background: var(--bg4);
  color: var(--cyan);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 12px;
}

.code-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 0;
  overflow-x: auto;
}

.code-block pre {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  line-height: 1.7;
  white-space: pre;
}

.code-block pre .c { color: var(--cyan); }
.code-block pre .g { color: var(--green); }
.code-block pre .y { color: var(--yellow); }
.code-block pre .a { color: var(--accent2); }
.code-block pre .d { color: var(--text2); }
.code-block pre .r { color: var(--red); }
.code-block pre .o { color: var(--orange); }

.info-box {
  display: flex;
  gap: 10px;
  background: rgba(124,106,247,0.08);
  border: 1px solid rgba(124,106,247,0.25);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin: 12px 0;
}

.info-box .ib-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.info-box .ib-text { font-size: 12px; color: var(--text2); line-height: 1.7; }
.info-box .ib-text strong { color: var(--accent2); font-weight: 500; }

.warn-box {
  display: flex;
  gap: 10px;
  background: rgba(245,200,66,0.06);
  border: 1px solid rgba(245,200,66,0.2);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin: 12px 0;
}

.warn-box .ib-text { font-size: 12px; color: var(--text2); line-height: 1.7; }
.warn-box .ib-text strong { color: var(--yellow); font-weight: 500; }

/* ── EXERCISES ────────────────────────────────────── */
.exercises-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.exercises-header h3 {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.exercises-header .ex-count {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
}

.exercise {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  overflow: hidden;
  transition: border-color 0.3s;
}

.exercise.ex-solved { border-color: var(--green2); }
.exercise.ex-solved .ex-header { background: rgba(61,214,140,0.04); }

.ex-header {
  padding: 14px 18px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.ex-badge {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}

.ex-badge.pending { background: var(--bg4); color: var(--text3); }
.ex-badge.solved { background: var(--green); color: #0d1a12; }
.ex-badge.error { background: var(--red); color: #fff; }

.ex-meta { flex: 1; }

.ex-type {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-bottom: 4px;
}

.ex-type.type-cmd { color: var(--cyan); }
.ex-type.type-code { color: var(--orange); }
.ex-type.type-regex { color: var(--yellow); }
.ex-type.type-multi { color: var(--accent2); }

.ex-question {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
  font-family: var(--font-mono);
}

.ex-body {
  padding: 0 18px 16px;
  border-top: 1px solid var(--border);
}

.ex-hint {
  font-size: 12px;
  color: var(--text3);
  padding: 10px 0 8px;
  line-height: 1.6;
}

.ex-hint code { color: var(--yellow); font-size: 11px; }

/* CodeMirror overrides */
.CodeMirror {
  font-family: var(--font-mono) !important;
  font-size: 13px !important;
  border-radius: var(--radius) !important;
  border: 1px solid var(--border) !important;
  height: auto !important;
}

.CodeMirror-scroll { min-height: 38px; }

.CodeMirror-focused { border-color: var(--accent) !important; }

/* Single line input */
.single-line .CodeMirror-scroll { max-height: 42px; overflow: hidden !important; }

.multi-line .CodeMirror-scroll { min-height: 120px; }

.ex-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  align-items: center;
}

.btn-check {
  padding: 7px 18px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-check:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-check:active { transform: translateY(0); }
.btn-check:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-hint {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text3);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-hint:hover { border-color: var(--yellow); color: var(--yellow); }

.btn-reset {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text3);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}

.btn-reset:hover { border-color: var(--border2); color: var(--text2); }

.loading-dots::after {
  content: '...';
  animation: dots 1.2s steps(4, end) infinite;
}

@keyframes dots {
  0%, 20% { content: '.'; }
  40% { content: '..'; }
  60%, 100% { content: '...'; }
}

/* Feedback */
.feedback {
  margin-top: 10px;
  border-radius: var(--radius);
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.7;
  display: none;
  animation: fadein 0.2s ease;
}

.feedback.show { display: block; }
.feedback.ok { background: rgba(61,214,140,0.08); border: 1px solid rgba(61,214,140,0.25); color: #6ee8a8; }
.feedback.err { background: rgba(245,95,109,0.08); border: 1px solid rgba(245,95,109,0.25); color: #f8a3aa; }
.feedback.hint { background: rgba(245,200,66,0.07); border: 1px solid rgba(245,200,66,0.2); color: var(--yellow); }

.feedback-title {
  font-weight: 600;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

.feedback code {
  background: rgba(255,255,255,0.08);
  color: inherit;
  font-size: 12px;
}

/* Multiple choice */
.mc-options { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; }

.mc-opt {
  padding: 9px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text2);
  transition: all 0.15s;
  text-align: left;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.mc-opt:hover:not(:disabled) { border-color: var(--accent); color: var(--text); background: var(--bg4); }
.mc-opt.mc-correct { border-color: var(--green); color: var(--green); background: rgba(61,214,140,0.06); }
.mc-opt.mc-wrong { border-color: var(--red); color: var(--red); background: rgba(245,95,109,0.06); }
.mc-opt:disabled { cursor: default; }

.mc-key {
  background: var(--bg4);
  border-radius: 4px;
  padding: 0 6px;
  font-size: 11px;
  color: var(--text3);
  flex-shrink: 0;
  min-width: 22px;
  text-align: center;
}

/* Topic nav buttons */
.topic-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.btn-nav {
  padding: 9px 18px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-nav:hover { border-color: var(--accent); color: var(--accent2); }
.btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

/* Mobile hamburger */
#menu-toggle {
  display: none;
  position: fixed;
  top: 16px; left: 16px;
  z-index: 200;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  width: 36px; height: 36px;
  align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: var(--text2);
}

/* API key modal */
#api-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
  backdrop-filter: blur(4px);
  display: none;
}

#api-modal.show { display: flex; }

.modal-box {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  max-width: 480px;
  width: 90%;
}

.modal-box h2 {
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.modal-box p { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 16px; }

.modal-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.15s;
}

.modal-input:focus { border-color: var(--accent); }

.modal-btns { display: flex; gap: 8px; }

.btn-primary {
  flex: 1;
  padding: 9px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-primary:hover { background: var(--accent2); }

.btn-secondary {
  padding: 9px 16px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 13px;
  cursor: pointer;
}

.btn-secondary:hover { border-color: var(--border2); color: var(--text); }

/* API key indicator */
#api-status {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 99px;
  padding: 6px 14px;
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 90;
}

#api-status:hover { border-color: var(--accent); color: var(--accent2); }

.api-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
}

.api-dot.connected { background: var(--green); }

@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); transition: transform 0.3s; }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  #menu-toggle { display: flex; }
  .topic-page { padding: 60px 20px 60px; }
}
</style>
</head>
<body>

<!-- Mobile menu toggle -->
<button id="menu-toggle" onclick="toggleSidebar()" aria-label="Menü">☰</button>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <div class="logo-icon">λ</div>
      Linux & OS
    </div>
    <div class="sb-progress">
      <div class="sb-progress-text" id="prog-text">0 / 13 téma · 0 feladat megoldva</div>
      <div class="sb-progress-bar"><div class="sb-progress-fill" id="prog-fill"></div></div>
    </div>
  </div>
  <div class="sb-nav" id="nav-list"></div>
</nav>

<!-- Main content -->
<main id="main">
  <!-- Topics injected by JS -->
</main>

<!-- API modal -->
<div id="api-modal">

<h4>Mi az operációs rendszer?</h4>
<p>Az operációs rendszer (OS) egy szoftver, amely <strong>közvetít a hardver és az alkalmazások között</strong>. Kezeli a memóriát, a processzort, a fájlrendszert, a hálózatot és az I/O eszközöket.</p>

<div class="code-block"><pre><span class="a">Felhasználói tér</span>  │ bash, python, vim, Firefox...

<span class="c">Shell / libc</span>     │ rendszerhívások burkolata

<span class="g">Kernel</span>           │ ütemező, memóriakezelés, driverek

<ul>

    theory: `
<h4>fork() – folyamat klónozása</h4>
<div class="code-block"><pre><span class="y">#include &lt;unistd.h&gt;</span>
<span class="y">#include &lt;sys/wait.h&gt;</span>
<span class="y">#include &lt;stdio.h&gt;</span>

<span class="c">int</span> main() {
    <span class="c">pid_t</span> pid = <span class="g">fork()</span>;

    if (pid <span class="r">&lt;</span> 0) {
        <span class="a">perror</span>("fork hiba");
        return 1;
    } else if (pid <span class="r">==</span> 0) {
        <span class="d">/* GYEREK folyamat */</span>
        printf(<span class="g">"Gyerek PID: %d\n"</span>, <span class="a">getpid()</span>);
        <span class="a">exit(0)</span>;
    } else {
        <span class="d">/* SZÜLŐ folyamat – pid = gyerek PID-je */</span>
        printf(<span class="g">"Szülő PID: %d, gyerek: %d\n"</span>, <span class="a">getpid()</span>, pid);
        <span class="a">wait(NULL)</span>; <span class="d">// megvárja a gyereket → elkerüli a zombie-t</span>
    }
    return 0;
}</pre></div>
<div class="info-box"><span class="ib-icon">💡</span><div class="ib-text"><strong>fork() visszatérési értéke:</strong> szülőben = gyerek PID-je (>0), gyerekben = 0, hiba esetén = -1.</div></div>

<h4>exit() vs _exit()</h4>
<div class="code-block"><pre><span class="c">exit(0)</span>    <span class="d"># stdio buffereket kiüríti, atexit() függvényeket hív</span>
<span class="c">_exit(0)</span>   <span class="d"># azonnal visszatér a kernelbe, bufferelés nélkül</span>
           <span class="d"># fork() utáni gyerekben ajánlott _exit() használni</span></pre></div>

          <span class="theory-arrow">▾</span>
        </button>
        <div class="theory-body ${ti===0?'open':''}">
          ${t.theory}
        </div>
      </div>

      <div class="exercises-header">
        <h3>Feladatok</h3>
        <span class="ex-count">${solved}/${exCount} megoldva</span>
      </div>
      <div id="exlist-${ti}">
        ${t.exercises.map((ex, ei) => buildExercise(ex, ti, ei)).join('')}
      </div>

      <div class="topic-nav">
        <button class="btn-nav" onclick="switchTopic(${ti-1})" ${ti===0?'disabled':''}>← Előző</button>
        <button class="btn-nav" onclick="switchTopic(${ti+1})" ${ti===TOPICS.length-1?'disabled':''}>Következő →</button>
      </div>
    `;
    main.appendChild(div);
  });
}

function buildExercise(ex, ti, ei) {
  const p = (progress[ti] || {})[ei] || {};
  const solved = !!p.solved;
  const typeClass = { cmd:'type-cmd', code:'type-code', regex:'type-regex', multi:'type-multi' }[ex.type] || '';

  let inputHTML = '';
  if (ex.type === 'multi') {
    inputHTML = `<div class="mc-options" id="mc-${ti}-${ei}">
      ${ex.options.map((opt, oi) => `
        <button class="mc-opt ${solved && oi===ex.correct?'mc-correct':''}"
          onclick="checkMulti(${ti},${ei},${oi})"
          ${solved?'disabled':''}
          data-idx="${oi}">
          <span class="mc-key">${String.fromCharCode(65+oi)}</span>
          ${opt}
        </button>`).join('')}
    </div>`;
  } else {
    const isMulti = ex.type === 'code';
    inputHTML = `
      <div class="ex-hint">${ex.hint ? '💡 ' + ex.hint.replace(/`([^`]+)`/g, '<code>$1</code>') : ''}</div>
      <textarea id="ta-${ti}-${ei}" class="${isMulti?'multi-line':'single-line'}">${ex.placeholder || ''}</textarea>
      <div class="ex-actions">
        <button class="btn-check" onclick="checkExercise(${ti},${ei})" ${solved?'disabled':''}>
          ${solved ? '✓ Megoldva' : '⚡ Ellenőrzés'}
        </button>
        ${!solved ? `<button class="btn-hint" onclick="showHint(${ti},${ei})">Tipp</button>` : ''}
        <button class="btn-reset" onclick="resetExercise(${ti},${ei})">Visszaállítás</button>
      </div>
    `;
  }

  return `
    <div class="exercise ${solved?'ex-solved':''}" id="ex-${ti}-${ei}">
      <div class="ex-header">
        <div class="ex-badge ${solved?'solved':'pending'}" id="badge-${ti}-${ei}">${solved?'✓':(ei+1)}</div>
        <div class="ex-meta">
          <div class="ex-type ${typeClass}">${ex.typeLabel}</div>
          <div class="ex-question">${ex.question.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\n/g, '<br>')}</div>
        </div>
      </div>
      <div class="ex-body">
        ${inputHTML}
        <div class="feedback" id="fb-${ti}-${ei}"></div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════
//  CODEMIRROR INIT
// ═══════════════════════════════════════════════════
function initEditors() {
  TOPICS.forEach((t, ti) => {
    t.exercises.forEach((ex, ei) => {
      if (ex.type === 'cmd' || ex.type === 'code' || ex.type === 'regex') {
        const ta = document.getElementById(`ta-${ti}-${ei}`);
        if (!ta) return;
        const mode = ex.lang || 'shell';
        const isSingle = ex.type !== 'code';
        const cm = CodeMirror.fromTextArea(ta, {
          mode: mode,
          theme: 'dracula',
          lineNumbers: !isSingle,
          lineWrapping: true,
          autofocus: false,
          extraKeys: { Enter: isSingle ? () => checkExercise(ti, ei) : CodeMirror.Pass }
        });
        if (isSingle) cm.setSize(null, 42);
        else cm.setSize(null, 140);
        editors[`${ti}_${ei}`] = cm;
      }
    });
  });
}

// ═══════════════════════════════════════════════════
//  TOPIC SWITCHING
// ═══════════════════════════════════════════════════
function switchTopic(idx) {
  if (idx < 0 || idx >= TOPICS.length) return;
  document.querySelectorAll('.topic-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + idx).classList.add('active');
  document.querySelector(`.nav-item[data-idx="${idx}"]`).classList.add('active');
  currentTopic = idx;
  window.scrollTo(0, 0);
  document.getElementById('main').scrollTo(0, 0);
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

function toggleTheory(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

// ═══════════════════════════════════════════════════
//  EXERCISE CHECKING
// ═══════════════════════════════════════════════════
function getEditorVal(ti, ei) {
  const k = `${ti}_${ei}`;
  if (editors[k]) return editors[k].getValue().trim();
  const ta = document.getElementById(`ta-${ti}-${ei}`);
  return ta ? ta.value.trim() : '';
}

function checkMulti(ti, ei, chosen) {
  const ex = TOPICS[ti].exercises[ei];
  const correct = chosen === ex.correct;
  const opts = document.querySelectorAll(`#mc-${ti}-${ei} .mc-opt`);
  opts.forEach((o, i) => {
    o.disabled = true;
    if (i === ex.correct) o.classList.add('mc-correct');
    else if (i === chosen && !correct) o.classList.add('mc-wrong');
  });
  showFeedback(ti, ei, correct, correct
    ? '✓ Helyes! ' + ex.explanation
    : '✗ Nem ez a helyes válasz. ' + ex.explanation
  );
  if (correct) markSolved(ti, ei);
}

async function checkExercise(ti, ei) {
  const ex = TOPICS[ti].exercises[ei];
  const val = getEditorVal(ti, ei);
  if (!val) { showFeedback(ti, ei, false, '✗ Adj meg egy választ!'); return; }

  const btn = document.querySelector(`#ex-${ti}-${ei} .btn-check`);
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots">Ellenőrzés</span>';

  try {
    if (ex.checkFn === 'cmd_simple') {
      const ok = ex.expected.some(e => normalize(val) === normalize(e));
      showFeedback(ti, ei, ok, ok
        ? '✓ Tökéletes! Ez a helyes parancs.'
        : `✗ Nem egészen. Próbáld újra! Elvárás: <code>${ex.expected[0]}</code>`);
      if (ok) markSolved(ti, ei); else btn.disabled = false;
    } else if (ex.checkFn === 'cmd_regex_contains') {
      const ok = ex.expected.some(e => normalize(val) === normalize(e));
      showFeedback(ti, ei, ok, ok
        ? '✓ Helyes pipeline kombináció!'
        : `✗ Nem egészen. Egy lehetséges helyes megoldás: <code>${ex.expected[0]}</code>`);
      if (ok) markSolved(ti, ei); else btn.disabled = false;
    } else if (ex.checkFn === 'regex_check') {
      checkRegex(ti, ei, val);
    } else if (ex.checkFn === 'ai_check') {
      await checkWithAI(ti, ei, val, ex);
    }
  } catch(e) {
    showFeedback(ti, ei, false, '✗ Hiba az ellenőrzés során: ' + e.message);
    btn.disabled = false;
  }
  btn.innerHTML = '⚡ Ellenőrzés';
}

function normalize(s) {
  return s.replace(/\s+/g, ' ').trim().replace(/['"]/g, '"');
}

function checkRegex(ti, ei, pattern) {
  const ex = TOPICS[ti].exercises[ei];
  try {
    const re = new RegExp('^' + pattern.replace(/^\^/, '').replace(/\$$/, '') + '$');
    const allMatch = ex.testCases.match.every(s => re.test(s));
    const noneMatch = ex.testCases.nomatch.every(s => !re.test(s));
    const ok = allMatch && noneMatch;

    if (ok) {
      showFeedback(ti, ei, true, `✓ Helyes regex! Illeszkedett: ${ex.testCases.match.map(s=>`<code>${s}</code>`).join(', ')}`);
      markSolved(ti, ei);
    } else {
      const failM = ex.testCases.match.filter(s => !re.test(s));
      const failN = ex.testCases.nomatch.filter(s => re.test(s));
      let msg = '✗ Nem teljesen helyes. ';
      if (failM.length) msg += `Nem illeszkedett (kellene): ${failM.map(s=>`<code>${s}</code>`).join(', ')}. `;
      if (failN.length) msg += `Illeszkedett (nem kellett volna): ${failN.map(s=>`<code>${s}</code>`).join(', ')}.`;
      showFeedback(ti, ei, false, msg);
      document.querySelector(`#ex-${ti}-${ei} .btn-check`).disabled = false;
    }
  } catch(e) {
    showFeedback(ti, ei, false, `✗ Érvénytelen regex: ${e.message}`);
    document.querySelector(`#ex-${ti}-${ei} .btn-check`).disabled = false;
  }
}

async function checkWithAI(ti, ei, val, ex) {
  const btn = document.querySelector(`#ex-${ti}-${ei} .btn-check`);
  if (!apiKey) {
    openApiModal();
    btn.disabled = false;
    btn.innerHTML = '⚡ Ellenőrzés';
    return;
  }

  const prompt = `Te egy Linux/C programozás oktató vagy. Értékeld a következő választ SZIGORÚAN és RÖVIDEN (max 3 mondat magyarul).

Feladat: ${ex.question}
Elvárt kritériumok: ${ex.criteria}
Tanuló válasza:
\`\`\`
${val}
\`\`\`

Válaszolj pontosan ebben a JSON formátumban:
{"helyes": true/false, "magyarazat": "rövid értékelés magyarul, max 2 mondat. Ha helyes, dicsérj és magyarázd mi jó. Ha hibás, pontosan mondd meg mi hiányzik."}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API hiba: ' + res.status);
    }

    const data = await res.json();
    const raw = data.content[0].text.trim();
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Nem sikerült értelmezni a választ');
    const parsed = JSON.parse(jsonMatch[0]);

    showFeedback(ti, ei, parsed.helyes,
      (parsed.helyes ? '✓ ' : '✗ ') + parsed.magyarazat);

    if (parsed.helyes) markSolved(ti, ei);
    else btn.disabled = false;
  } catch(e) {
    showFeedback(ti, ei, false, '✗ AI ellenőrzési hiba: ' + e.message + '. Ellenőrizd az API kulcsot!');
    btn.disabled = false;
  }
}

function showFeedback(ti, ei, ok, msg) {
  const fb = document.getElementById(`fb-${ti}-${ei}`);
  fb.className = 'feedback show ' + (ok ? 'ok' : 'err');
  fb.innerHTML = msg;
}

function showHint(ti, ei) {
  const ex = TOPICS[ti].exercises[ei];
  const fb = document.getElementById(`fb-${ti}-${ei}`);
  fb.className = 'feedback show hint';
  fb.innerHTML = '💡 ' + (ex.hint || 'Nézd meg az elméleti részt!').replace(/`([^`]+)`/g, '<code>$1</code>');
}

function markSolved(ti, ei) {
  if (!progress[ti]) progress[ti] = {};
  progress[ti][ei] = { solved: true };
  localStorage.setItem('linux_progress', JSON.stringify(progress));

  // Update badge
  const badge = document.getElementById(`badge-${ti}-${ei}`);
  if (badge) { badge.className = 'ex-badge solved'; badge.textContent = '✓'; }
  const exEl = document.getElementById(`ex-${ti}-${ei}`);
  if (exEl) exEl.classList.add('ex-solved');

  const btn = document.querySelector(`#ex-${ti}-${ei} .btn-check`);
  if (btn) { btn.disabled = true; btn.innerHTML = '✓ Megoldva'; }

  updateProgress();
  updateNavItem(ti);
}

function resetExercise(ti, ei) {
  if (progress[ti]) delete progress[ti][ei];
  localStorage.setItem('linux_progress', JSON.stringify(progress));

  const badge = document.getElementById(`badge-${ti}-${ei}`);
  if (badge) { badge.className = 'ex-badge pending'; badge.textContent = ei+1; }
  const exEl = document.getElementById(`ex-${ti}-${ei}`);
  if (exEl) exEl.classList.remove('ex-solved');

  const btn = document.querySelector(`#ex-${ti}-${ei} .btn-check`);
  if (btn) { btn.disabled = false; btn.innerHTML = '⚡ Ellenőrzés'; }

  const fb = document.getElementById(`fb-${ti}-${ei}`);
  if (fb) fb.className = 'feedback';

  const k = `${ti}_${ei}`;
  if (editors[k]) {
    const ex = TOPICS[ti].exercises[ei];
    editors[k].setValue(ex.placeholder || '');
  }

  const mc = document.getElementById(`mc-${ti}-${ei}`);
  if (mc) {
    mc.querySelectorAll('.mc-opt').forEach(o => {
      o.disabled = false;
      o.classList.remove('mc-correct', 'mc-wrong');
    });
  }

  updateProgress();
  updateNavItem(ti);
}

function updateProgress() {
  let total = 0, solved = 0;
  TOPICS.forEach((t, ti) => {
    total += t.exercises.length;
    solved += Object.values(progress[ti] || {}).filter(x => x.solved).length;
  });
  const pct = total > 0 ? Math.round(solved / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${Math.round(pct/100*TOPICS.length*10)/10 | 0} / ${TOPICS.length} téma · ${solved} feladat megoldva`;
}

function updateNavItem(ti) {
  const t = TOPICS[ti];
  const p = progress[ti] || {};
  const total = t.exercises.length;
  const solved = Object.values(p).filter(x => x.solved).length;
  const navCheck = document.querySelector(`.nav-item[data-idx="${ti}"] .nav-check`);
  if (!navCheck) return;
  if (solved === total && total > 0) { navCheck.className = 'nav-check done'; navCheck.textContent = '✓'; }
  else if (solved > 0) { navCheck.className = 'nav-check partial'; navCheck.textContent = solved; }
  else { navCheck.className = 'nav-check'; navCheck.textContent = ''; }

  // Update ex count label
  const exCount = document.querySelector(`#page-${ti} .ex-count`);
  if (exCount) exCount.textContent = `${solved}/${total} megoldva`;
}

// ═══════════════════════════════════════════════════
//  API KEY
// ═══════════════════════════════════════════════════
function openApiModal() { document.getElementById('api-modal').classList.add('show'); }
function closeApiModal() { document.getElementById('api-modal').classList.remove('show'); }

function saveApiKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) return;
  apiKey = k;
  localStorage.setItem('linux_api_key', k);
  updateApiStatus();
  closeApiModal();
}

function updateApiStatus() {
  const dot = document.getElementById('api-dot');
  const lbl = document.getElementById('api-label');
  if (apiKey) {
    dot.className = 'api-dot connected';
    lbl.textContent = 'API: beállítva';
  } else {
    dot.className = 'api-dot';
    lbl.textContent = 'API kulcs beállítása';
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
buildNav();
buildPages();
setTimeout(initEditors, 50);
updateProgress();
updateApiStatus();
if (apiKey) document.getElementById('api-key-input').value = apiKey;
</script>
</body>
</html>
